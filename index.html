<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <!-- 飛機網頁圖示 (Favicon) -->

  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Phosphor Icons 取代原先的 Lucide Icons -->

  <style>
    /* 自訂動畫效果 (取代 Tailwind animate-in plugin) */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInRight { from { transform: translateX(2rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .slide-in-from-bottom-4 { animation: slideInBottom 0.5s ease-out forwards; }
    .slide-in-from-right-8 { animation: slideInRight 0.3s ease-out forwards; }
    .zoom-in-95 { animation: zoomIn 0.2s ease-out forwards; }
    
    /* 隱藏捲軸但保留捲動功能 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#F8FAFC] font-sans text-gray-800">

  <!-- 應用程式根節點 -->
  <div id="app-root">
    <!-- 導覽列 -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-10">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <div 
          class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity" 
          onclick="goHome()"
          title="返回首頁"
        >
          <div class="bg-gray-900 p-2 rounded-xl text-white flex items-center justify-center">
            <i class="ph-bold ph-airplane-tilt text-xl"></i>
          </div>
          <span class="text-xl font-black text-gray-900 tracking-tight select-none">
            艾迪王 <span class="text-gray-400 font-medium text-lg">清艙快訊</span>
          </span>
        </div>
      </div>
    </nav>

    <!-- 主內容區 -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10" id="main-content">
      <!-- 內容將由 JavaScript 動態渲染 -->
    </main>

    <!-- 頁尾聲明 -->
    <footer class="mt-12 py-10 px-4 border-t border-gray-200 bg-white/50 text-center text-sm text-gray-500">
      <div class="max-w-3xl mx-auto flex flex-col items-center">
        <p class="font-bold text-gray-700 mb-4">✈️ 艾迪王 清艙機票快訊</p>
        
        <!-- 社群連結 -->
        <div class="flex items-center gap-5 mb-6">
          <a 
            href="https://www.facebook.com/profile.php?id=61579148033952" 
            target="_blank" 
            rel="noreferrer" 
            class="p-2.5 bg-white rounded-full shadow-sm border border-gray-100 text-gray-400 hover:text-blue-600 hover:shadow transition-all flex items-center justify-center"
            title="艾迪王 Facebook"
          >
            <i class="ph-fill ph-facebook-logo text-xl"></i>
          </a>
          <a 
            href="https://www.instagram.com/eddie.tour/" 
            target="_blank" 
            rel="noreferrer" 
            class="p-2.5 bg-white rounded-full shadow-sm border border-gray-100 text-gray-400 hover:text-pink-600 hover:shadow transition-all flex items-center justify-center"
            title="艾迪王 Instagram"
          >
            <i class="ph-fill ph-instagram-logo text-xl"></i>
          </a>
        </div>

        <p class="leading-relaxed">
          本網站由艾迪王 @eddie.tour 維護，致力於為粉絲統整各大旅行社的超值晚鳥與清艙機票資訊。<br class="hidden sm:block" />
          點擊「LINE 搶購」按鈕後，將會直接連結至合作旅行社的官方 LINE 帳號。<br class="hidden sm:block" />
          後續的航班諮詢、保留機位與開票收款等作業，皆由專業合法之旅行社為您服務，保障您的交易安全。
        </p>
      </div>
    </footer>

    <!-- 彈出視窗根節點 -->
    <div id="modal-root"></div>
  </div>

  <script>
    // --- 參數設定 ---
    const SHEET_ID = '11K6w4hIwjTdUz1nJo4nt6i0GMC7QujZD8Mky4yy0zZ8';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    const LOCATION_DATA = [
      {
        country: '日本',
        image: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80',
        cities: ['東京', '大阪', '沖繩', '北海道', '石垣島', '名古屋', '仙台', '花卷', '新潟', '秋田', '高松', '福岡', '宮古島', '高知']
      },
      {
        country: '韓國',
        image: 'https://images.unsplash.com/photo-1546874177-9e664107314e?auto=format&fit=crop&w=800&q=80',
        cities: ['首爾', '釜山', '濟州島']
      },
      {
        country: '泰國',
        image: 'https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?auto=format&fit=crop&w=800&q=80',
        cities: ['曼谷']
      },
      {
        country: '越南',
        image: 'https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=800&q=80',
        cities: ['峴港']
      },
      {
        country: '其他',
        image: 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=800&q=80',
        cities: ['其他航點']
      }
    ];

    // --- 狀態管理 (State) ---
    const state = {
      tickets: [],
      tours: [],
      isLoading: true,
      selectedCountryObj: null,
      selectedCity: null,
      currentDate: new Date(),
      selectedDateTickets: null,
      isModalOpen: false,
      animateTransition: true // 控制動畫是否播放
    };

    // --- 資料串接邏輯 (Google Sheets) ---
    async function fetchSheetData() {
      state.isLoading = true;
      renderMain();
      try {
        // 加入快取迴避參數
        const cacheBuster = `&cache=${new Date().getTime()}`;
        
        // 1. 讀取機票資料
        const resFlights = await fetch(SHEET_URL + cacheBuster);
        const textFlights = await resFlights.text();
        const jsonStrFlights = textFlights.substring(textFlights.indexOf('{'), textFlights.lastIndexOf('}') + 1);
        const dataFlights = JSON.parse(jsonStrFlights);

        if (dataFlights && dataFlights.table && dataFlights.table.rows) {
          state.tickets = dataFlights.table.rows.slice(1).map((row, index) => {
            let dateVal = '';
            if (row.c[2]) {
              dateVal = row.c[2].f || row.c[2].v || ''; 
              dateVal = String(dateVal).replace(/\//g, '-'); 
            }
            return {
              id: `ticket-${index}`,
              country: row.c[0]?.v || '',
              city: row.c[1]?.v || '',
              date: dateVal, 
              airline: row.c[3]?.v || '',
              price: row.c[4]?.v || row.c[4]?.f || '', 
              details: row.c[5]?.v || '',
              link: row.c[6]?.v || ''
            };
          }).filter(t => t.country && t.city && t.date);
        }

        // 2. 讀取旅行團資料
        try {
          // 使用 encodeURIComponent 確保中文分頁名稱「旅行團」能被正確解析
          const sheetName = encodeURIComponent('旅行團');
          const resTours = await fetch(`${SHEET_URL}&sheet=${sheetName}${cacheBuster}`);
          const textTours = await resTours.text();
          const jsonStrTours = textTours.substring(textTours.indexOf('{'), textTours.lastIndexOf('}') + 1);
          const dataTours = JSON.parse(jsonStrTours);
          
          if (dataTours && dataTours.table && dataTours.table.rows) {
            state.tours = dataTours.table.rows.slice(1).map((row, index) => {
              let dateVal = '';
              if (row.c[2]) {
                dateVal = row.c[2].f || row.c[2].v || ''; 
                dateVal = String(dateVal).replace(/\//g, '-'); 
              }
              return {
                id: `tour-${index}`,
                country: row.c[0]?.v || '',
                title: row.c[1]?.v || '',
                date: dateVal, 
                days: row.c[3]?.v || '',
                price: row.c[4]?.v || row.c[4]?.f || '', 
                details: row.c[5]?.v || '',
                link: row.c[6]?.v || ''
              };
            }).filter(t => t.country && t.title);
          }
        } catch (e) {
          console.error('旅行團資料讀取失敗 (請確認分頁名稱為「旅行團」):', e);
        }

      } catch (error) {
        console.error('讀取 Google Sheet 錯誤:', error);
      } finally {
        state.isLoading = false;
        state.animateTransition = true;
        renderMain();
        state.animateTransition = false;
      }
    }

    // --- 事件處理函式 ---
    window.goHome = () => {
      state.selectedCountryObj = null;
      state.selectedCity = null;
      state.currentDate = new Date(); // 重置為當前真實月份
      state.animateTransition = true; // 觸發返回首頁動畫
      renderMain();
      state.animateTransition = false; // 渲染後關閉動畫標記
      window.scrollTo({ top: 0, behavior: 'smooth' }); // 自動捲動到最上方
    };

    window.selectCountry = (index) => {
      if (index === 'tours') {
        state.selectedCountryObj = { isTours: true };
      } else {
        state.selectedCountryObj = LOCATION_DATA[index];
        state.selectedCity = LOCATION_DATA[index].cities[0];
      }
      state.animateTransition = true; // 觸發進入該國家的動畫
      renderMain();
      state.animateTransition = false; // 渲染後關閉動畫標記
      window.scrollTo({ top: 0, behavior: 'smooth' }); // 自動捲動到最上方
    };

    window.selectCity = (city) => {
      state.selectedCity = city;
      state.animateTransition = false; // 切換城市不需要大動畫
      renderMain();
    };

    window.prevMonth = () => {
      state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() - 1, 1);
      state.animateTransition = false; // 翻頁不需要大動畫
      renderMain();
    };

    window.nextMonth = () => {
      state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + 1, 1);
      state.animateTransition = false; // 翻頁不需要大動畫
      renderMain();
    };

    window.openModal = (dateStr) => {
      const dayTickets = state.tickets.filter(t => t.country === state.selectedCountryObj.country && t.city === state.selectedCity && t.date === dateStr);
      if (dayTickets.length > 0) {
        state.selectedDateTickets = { date: dateStr, tickets: dayTickets };
        state.isModalOpen = true;
        renderModal();
      }
    };

    window.closeModal = () => {
      state.isModalOpen = false;
      renderModal();
    };

    // --- 渲染邏輯 (UI 產生器) ---
    
    // 渲染載入中
    function getLoadingHTML() {
      return `
        <div class="flex flex-col items-center justify-center py-32 fade-in">
          <i class="ph-bold ph-airplane-tilt text-5xl text-gray-300 mb-4 animate-bounce"></i>
          <p class="text-gray-500 font-medium">正在同步最新資料...</p>
        </div>
      `;
    }

    // 渲染首頁 (國家/旅行團選擇)
    function getHomeHTML() {
      let cardsHTML = LOCATION_DATA.map((loc, index) => `
        <div 
          onclick="selectCountry(${index})"
          class="group relative h-64 rounded-3xl overflow-hidden cursor-pointer shadow-sm hover:shadow-xl transition-all duration-300"
        >
          <img src="${loc.image}" alt="${loc.country}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
          <div class="absolute inset-0 bg-gradient-to-t from-gray-900/80 via-gray-900/20 to-transparent transition-opacity group-hover:opacity-90"></div>
          <div class="absolute bottom-0 left-0 p-6">
            <h3 class="text-2xl font-bold text-white mb-1 flex items-center gap-2">
              <i class="ph-bold ph-map-pin text-white/80"></i> ${loc.country}
            </h3>
            <p class="text-white/70 text-sm font-medium">包含 ${loc.cities.length} 個熱門航點</p>
          </div>
        </div>
      `).join('');

      cardsHTML += `
        <div 
          onclick="selectCountry('tours')"
          class="group relative h-64 rounded-3xl overflow-hidden cursor-pointer shadow-sm hover:shadow-xl transition-all duration-300 ring-2 ring-transparent hover:ring-blue-500/50"
        >
          <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=800&q=80" alt="優惠旅行團" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
          <div class="absolute inset-0 bg-gradient-to-t from-gray-900/90 via-gray-900/30 to-transparent transition-opacity group-hover:opacity-90"></div>
          <div class="absolute bottom-0 left-0 p-6 w-full">
            <div class="flex items-center gap-2 mb-1">
              <div class="bg-blue-600 p-1.5 rounded-lg text-white flex items-center justify-center">
                <i class="ph-bold ph-briefcase"></i>
              </div>
              <h3 class="text-2xl font-bold text-white">優惠旅行團</h3>
            </div>
            <p class="text-white/80 text-sm font-medium">精選高 CP 值套裝行程</p>
          </div>
        </div>
      `;

      return `
        <div class="${state.animateTransition ? 'slide-in-from-bottom-4' : ''}">
          <div class="text-center max-w-2xl mx-auto mb-12">
            <h1 class="text-3xl font-black text-gray-900 mb-4 tracking-tight">找尋您的下一個目的地</h1>
            <p class="text-gray-500">點擊國家探索最新晚鳥清艙機票，或查看精選旅行團</p>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            ${cardsHTML}
          </div>
        </div>
      `;
    }

    // 渲染旅行團列表
    function getToursHTML() {
      let innerHTML = '';
      if (state.tours.length === 0) {
        innerHTML = `
          <div class="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm ${state.animateTransition ? 'fade-in' : ''}">
            <i class="ph-bold ph-briefcase text-5xl text-gray-300 mb-4 block mx-auto w-fit"></i>
            <h3 class="text-xl font-bold text-gray-800 mb-2">目前沒有旅行團資訊</h3>
            <p class="text-gray-500">請稍後再回來看看，或聯繫客服詢問最新行程！</p>
          </div>
        `;
      } else {
        const cardsHTML = state.tours.map(tour => {
          const isKKday = (tour.title && tour.title.toLowerCase().includes('kkday')) || (tour.link && tour.link.toLowerCase().includes('kkday'));
          const btnText = isKKday ? "前往 KKday 報名" : (tour.link ? "前往指定網頁報名" : "聯繫合作旅行社 LINE 報名");
          const btnLink = tour.link || "https://line.me/R/ti/p/@your_line_id";
          const btnClass = isKKday 
            ? "bg-[#26C2CD] hover:bg-[#1db0ba] shadow-cyan-200/50" 
            : (tour.link ? "bg-blue-600 hover:bg-blue-700 shadow-blue-200/50" : "bg-[#06C755] hover:bg-[#05b34c] shadow-green-200/50");
          const btnIcon = isKKday || tour.link ? '<i class="ph-bold ph-arrow-square-out text-xl"></i>' : '<i class="ph-bold ph-chat-circle-dots text-xl"></i>';

          return `
            <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col">
              <div class="p-6 flex-1 flex flex-col">
                <div class="flex justify-between items-start mb-4">
                  <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-gray-100 text-gray-700 text-xs font-bold rounded-lg">
                    <i class="ph-bold ph-map-pin"></i> ${tour.country}
                  </span>
                  ${tour.price ? `
                    <div class="text-right">
                      <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">優惠價</div>
                      <div class="text-lg font-black text-red-500">$${tour.price}</div>
                    </div>
                  ` : ''}
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-3 leading-tight">${tour.title}</h3>
                <div class="flex flex-wrap gap-2 mb-4">
                  ${tour.date ? `
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1.5 bg-blue-50 text-blue-700 text-xs font-bold rounded-md">
                      <i class="ph-bold ph-calendar-blank"></i> 出發: ${tour.date}
                    </span>
                  ` : ''}
                  ${tour.days ? `
                    <span class="inline-flex items-center gap-1.5 px-2.5 py-1.5 bg-orange-50 text-orange-700 text-xs font-bold rounded-md">
                      <i class="ph-bold ph-briefcase"></i> ${tour.days}
                    </span>
                  ` : ''}
                </div>
                <div class="bg-gray-50 p-4 rounded-xl text-sm text-gray-600 whitespace-pre-wrap leading-relaxed flex-1 mt-auto border border-gray-100">${tour.details}</div>
              </div>
              <div class="px-6 pb-6 pt-2">
                <a href="${btnLink}" target="_blank" rel="noreferrer" class="w-full text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm ${btnClass}">
                  ${btnIcon} ${btnText}
                </a>
              </div>
            </div>
          `;
        }).join('');

        innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 ${state.animateTransition ? 'fade-in' : ''}">${cardsHTML}</div>`;
      }

      return `
        <div class="${state.animateTransition ? 'slide-in-from-right-8' : ''}">
          <div class="flex items-center gap-4 mb-8">
            <button onclick="goHome()" class="p-2.5 bg-white border border-gray-200 rounded-full text-gray-600 hover:bg-gray-50 transition-colors shadow-sm flex items-center justify-center">
              <i class="ph-bold ph-arrow-left text-xl"></i>
            </button>
            <div>
              <h1 class="text-2xl font-bold text-gray-900">精選優惠旅行團</h1>
              <p class="text-sm text-gray-500 mt-1">為您挑選最高 CP 值的套裝行程，輕鬆出遊沒煩惱</p>
            </div>
          </div>
          ${innerHTML}
        </div>
      `;
    }

    // 渲染機票月曆視圖
    function getFlightsHTML() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const filteredTickets = state.tickets.filter(t => t.country === state.selectedCountryObj.country && t.city === state.selectedCity);

      let blanksHTML = '';
      for (let i = 0; i < firstDay; i++) {
        blanksHTML += `<div class="bg-white/50 min-h-[80px] sm:min-h-[100px] p-1 sm:p-2"></div>`;
      }

      let daysHTML = '';
      const todayStr = new Date().toISOString().split('T')[0];

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dayTickets = filteredTickets.filter(t => t.date === dateStr);
        const hasTickets = dayTickets.length > 0;
        const isToday = todayStr === dateStr;

        // 手機版只顯示金額，電腦版顯示完整資訊
        let ticketsHTML = dayTickets.map(ticket => `
          <div class="text-[10px] sm:text-[11px] px-0.5 sm:px-2 py-1 sm:py-1.5 bg-blue-50 text-blue-700 rounded sm:rounded-md truncate font-medium border border-blue-100/50 shadow-sm text-center sm:text-left leading-tight">
            <span class="hidden sm:inline">${ticket.airline} ${ticket.price ? '$'+ticket.price : ''}</span>
            <span class="sm:hidden">${ticket.price ? '$'+ticket.price : '有票'}</span>
          </div>
        `).join('');

        daysHTML += `
          <div 
            class="bg-white min-h-[80px] sm:min-h-[110px] p-1 sm:p-2 transition-all relative group ${hasTickets ? 'cursor-pointer hover:bg-blue-50/50' : 'text-gray-400'}"
            ${hasTickets ? `onclick="openModal('${dateStr}')"` : ''}
          >
            <div class="text-xs sm:text-sm font-semibold inline-flex items-center justify-center w-6 h-6 sm:w-7 sm:h-7 rounded-full mb-1 ${isToday ? 'bg-gray-900 text-white' : 'text-gray-700'}">
              ${d}
            </div>
            <div class="flex flex-col gap-1 sm:gap-1.5">${ticketsHTML}</div>
          </div>
        `;
      }

      const pillsHTML = state.selectedCountryObj.cities.map(city => `
        <button
          onclick="selectCity('${city}')"
          class="px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${state.selectedCity === city ? 'bg-gray-900 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:border-gray-300 hover:bg-gray-50'}"
        >
          ${city}
        </button>
      `).join('');

      return `
        <div class="${state.animateTransition ? 'slide-in-from-right-8' : ''}">
          <!-- 頂部導航 -->
          <div class="flex items-center gap-4 mb-8">
            <button onclick="goHome()" class="p-2.5 bg-white border border-gray-200 rounded-full text-gray-600 hover:bg-gray-50 transition-colors shadow-sm flex items-center justify-center">
              <i class="ph-bold ph-arrow-left text-xl"></i>
            </button>
            <div>
              <h1 class="text-2xl font-bold text-gray-900">${state.selectedCountryObj.country} 清艙機票</h1>
              <p class="text-sm text-gray-500 mt-1">請選擇欲查詢的城市</p>
            </div>
          </div>

          <!-- 城市按鈕 -->
          <div class="flex flex-wrap gap-2.5 mb-8">
            ${pillsHTML}
          </div>

          <!-- 月曆 -->
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden ${state.animateTransition ? 'fade-in' : ''}">
            <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 bg-white">
              <button onclick="prevMonth()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600 flex items-center justify-center">
                <i class="ph-bold ph-caret-left text-xl"></i>
              </button>
              <h2 class="text-lg font-bold text-gray-800 tracking-wider">
                ${year}年 ${month + 1}月
              </h2>
              <button onclick="nextMonth()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600 flex items-center justify-center">
                <i class="ph-bold ph-caret-right text-xl"></i>
              </button>
            </div>
            
            <div class="grid grid-cols-7 gap-px bg-gray-100 border-b border-gray-100">
              ${['日', '一', '二', '三', '四', '五', '六'].map(day => `<div class="bg-white py-2 sm:py-3 text-center text-[10px] sm:text-xs font-bold text-gray-400">${day}</div>`).join('')}
            </div>

            <div class="grid grid-cols-7 gap-px bg-gray-100">
              ${blanksHTML}
              ${daysHTML}
            </div>
          </div>
        </div>
      `;
    }

    // 渲染 Modal
    function renderModal() {
      const modalRoot = document.getElementById('modal-root');
      if (!state.isModalOpen || !state.selectedDateTickets) {
        modalRoot.innerHTML = '';
        return;
      }

      const contentHTML = state.selectedDateTickets.tickets.map((ticket, index) => {
        const isKKday = (ticket.airline && ticket.airline.toLowerCase().includes('kkday')) || (ticket.link && ticket.link.toLowerCase().includes('kkday'));
        const btnText = isKKday ? "前往 KKday 搶購" : (ticket.link ? "前往指定網頁搶購" : "聯繫合作旅行社 LINE 搶購");
        const btnLink = ticket.link || "https://line.me/R/ti/p/@your_line_id";
        const btnClass = isKKday 
          ? "bg-[#26C2CD] hover:bg-[#1db0ba] shadow-cyan-200/50" 
          : (ticket.link ? "bg-blue-600 hover:bg-blue-700 shadow-blue-200/50" : "bg-[#06C755] hover:bg-[#05b34c] shadow-green-200/50");
        const btnIcon = isKKday || ticket.link ? '<i class="ph-bold ph-arrow-square-out text-xl"></i>' : '<i class="ph-bold ph-chat-circle-dots text-xl"></i>';

        return `
          <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm ${index !== 0 ? 'mt-4' : ''}">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="inline-block bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded-md mb-2">
                  ${ticket.country} · ${ticket.city}
                </span>
                <h4 class="text-lg font-black text-gray-900">${ticket.airline}</h4>
              </div>
              ${ticket.price ? `
                <div class="text-right">
                  <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">優惠價</div>
                  <div class="text-xl font-black text-red-500">$${ticket.price}</div>
                </div>
              ` : ''}
            </div>
            
            <div class="bg-gray-50 p-4 rounded-xl text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${ticket.details}</div>
            
            <a href="${btnLink}" target="_blank" rel="noreferrer" class="mt-5 w-full text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm ${btnClass}">
              ${btnIcon} ${btnText}
            </a>
          </div>
        `;
      }).join('');

      modalRoot.innerHTML = `
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in">
          <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden zoom-in-95">
            <!-- Modal 標頭 -->
            <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
              <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                <i class="ph-bold ph-calendar-blank text-gray-400"></i> ${state.selectedDateTickets.date}
              </h3>
              <button onclick="closeModal()" class="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-full transition-colors flex items-center justify-center">
                <i class="ph-bold ph-x text-xl"></i>
              </button>
            </div>
            
            <!-- Modal 內容 -->
            <div class="p-6 max-h-[60vh] overflow-y-auto space-y-6 bg-gray-50/50 no-scrollbar">
              ${contentHTML}
            </div>
          </div>
        </div>
      `;
    }

    // 主內容切換
    function renderMain() {
      const mainEl = document.getElementById('main-content');
      if (state.isLoading) {
        mainEl.innerHTML = getLoadingHTML();
      } else if (!state.selectedCountryObj) {
        mainEl.innerHTML = getHomeHTML();
      } else if (state.selectedCountryObj.isTours) {
        mainEl.innerHTML = getToursHTML();
      } else {
        mainEl.innerHTML = getFlightsHTML();
      }
    }

    // --- 啟動應用程式 ---
    window.addEventListener('DOMContentLoaded', () => {
      fetchSheetData();
    });

  </script>
</body>
</html>
