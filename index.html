        const fluffRegex = /^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉更新降價再降大降價清艙促銷最後機會預估最新快訊]+$/u;
        if (fluffRegex.test(line)) continue;
        let score = 0, lineContainsCityRelated = false;
        if (city !== '其他航點' && line.includes(city)) { lineContainsCityRelated = true; }
        if (!lineContainsCityRelated && city !== '其他航點') {
          const mapping = CITY_ALIASES.find(m => m.standard === city);
          if (mapping) { for(let alias of mapping.aliases) { if(line.includes(alias)) { lineContainsCityRelated = true; break; } } }
        }
        if (lineContainsCityRelated) score = 2; else if (country !== '其他' && line.includes(country)) score = 1;
        if (score > titleScore) { bestTitle = line; titleScore = score; }
      }
      if (bestTitle) {
        title = bestTitle.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '').replace(/^(更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();
      } else if (lines.length > 0) {
        title = lines[0].replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '').replace(/^(更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();
      }
      return { title, country, city };
    }

    function parseRawDetails(details, fallbackDate, fallbackPrice) {
      const isGlobalPak = details && (details.includes('機+酒') || details.includes('機加酒') || details.includes('機＋酒') || details.includes('自由行'));
      const isGlobalBogo = details && details.includes('買一送一');
      if (!details) return [{ date: fallbackDate, price: fallbackPrice, isFlightAndHotel: false, isBogo: false, cityContext: null, titleContext: null }];
      const lines = details.split('\n'), items = [];
      const currentYear = new Date().getFullYear();
      let isPakState = isGlobalPak, currentCityContext = null, currentTitleContext = null, runningPrice = fallbackPrice ? String(fallbackPrice).replace(/,/g, '') : null;
      const extractDates = (text) => {
        if (!text) return [];
        const dates = [];
        let currentM = null, currentY = currentYear;
        const dateListRegex = /(?:^|[^\d])((?:\d{4}[\/\-])?\d{1,2}[\/\-]\d{1,2}(?!\s*[:月號])(?:[、，,\.\s\-]+(?:\d{1,2}[\/\-])?\d{1,2}(?!\s*[:月號]))*)/g;
        let match; const matchList = [];
        while ((match = dateListRegex.exec(text)) !== null) { matchList.push(match[1]); }
        if (matchList.length > 0) {
          matchList.forEach(listStr => {
            let safeStr = listStr.replace(/(\d{4})-(\d{1,2})-(\d{1,2})/g, '$1/$2/$3').replace(/(^|[^0-9\/])(\d{1,2})-(\d{1,2})(?=[^0-9\/]|$)/g, '$1$2/$3').replace(/\-/g, '、');
            const tokens = safeStr.split(/[、，,\.\s]+/);
            tokens.forEach(token => {
              if (!token) return;
              const parts = token.split('/');
              let y, m, d;
              if (parts.length === 3) { y = parseInt(parts[0], 10); m = parseInt(parts[1], 10); d = parseInt(parts[2], 10); currentY = y; currentM = m; }
              else if (parts.length === 2) { m = parseInt(parts[0], 10); d = parseInt(parts[1], 10); currentM = m; y = (currentM < 3) ? currentYear + 1 : currentYear; currentY = y; }
              else if (parts.length === 1) { d = parseInt(parts[0], 10); if (currentM !== null) { y = currentY; m = currentM; } else { return; } }
              else { return; }
              if (m >= 1 && m <= 12 && d >= 1 && d <= 31) { dates.push(`${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`); }
            });
          });
        }
        return dates;
      };
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        let foundCityInLine = getCityFromText(line);
        if (foundCityInLine) {
            currentCityContext = foundCityInLine;
            let cleanLine = line.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '').replace(/^(更新|降價|再調|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();
            if (cleanLine.length > 2) currentTitleContext = cleanLine;
        }
        if (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) isPakState = true;
        else if (line.includes('純機票') || line.includes('單機票')) isPakState = false;
        const priceMatch = line.match(/(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|機票)[:：\s\-\$＄]*([0-9,]{3,})/i);
        if (priceMatch) runningPrice = priceMatch[1].replace(/,/g, ''); 
        let dates = extractDates(line);
        if (dates.length > 0) {
            let priceForTheseDates = runningPrice;
            if (!priceMatch && i < lines.length - 1) {
                const nextLine = lines[i+1], nextPriceMatch = nextLine.match(/(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|機票)[:：\s\-\$＄]*([0-9,]{3,})/i);
                if (nextPriceMatch && extractDates(nextLine).length === 0) { priceForTheseDates = nextPriceMatch[1].replace(/,/g, ''); runningPrice = priceForTheseDates; }
            }
            if (!priceForTheseDates) { for (let j = 0; j < lines.length; j++) { const pm = lines[j].match(/(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|機票)[:：\s\-\$＄]*([0-9,]{3,})/i); if (pm) { priceForTheseDates = pm[1].replace(/,/g, ''); runningPrice = priceForTheseDates; break; } } }
            for (let dateStr of dates) {
                let lineIsPak = (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) ? true : (line.includes('純機票') || line.includes('單機票')) ? false : isPakState;
                let lineIsBogo = isGlobalBogo || line.includes('買一送一');
                items.push({ date: dateStr, price: priceForTheseDates || '', isFlightAndHotel: lineIsPak, isBogo: lineIsBogo, cityContext: currentCityContext, titleContext: currentTitleContext });
            }
        }
      }
      if (items.length > 0) return items;
      return [{ date: fallbackDate, price: runningPrice || '', isFlightAndHotel: isGlobalPak, isBogo: isGlobalBogo, cityContext: currentCityContext, titleContext: currentTitleContext }];
    }

    async function fetchSheetData(force = false) {
      const CACHE_KEY_TICKETS = 'eddie_tickets_v1', CACHE_KEY_TOURS = 'eddie_tours_v1', CACHE_TIME = 'eddie_cache_time_v1', now = new Date().getTime();
      
      if (!force) {
        const cachedTickets = sessionStorage.getItem(CACHE_KEY_TICKETS), cachedTours = sessionStorage.getItem(CACHE_KEY_TOURS), cacheTime = sessionStorage.getItem(CACHE_TIME);
        if (cachedTickets && cachedTours && cacheTime && (now - parseInt(cacheTime)) < 5 * 60 * 1000) { 
          state.tickets = JSON.parse(cachedTickets); 
          state.tours = JSON.parse(cachedTours); 
          state.isLoading = false; 
          renderMain(); 
          return; 
        }
      }

      renderMain(); 

      try {
        const res = await fetch(`${API_URL}?cache=${now}`);
        const data = await res.json();
        if (data && data.tickets) {
          let allTickets = data.tickets.flatMap((row, index) => {
            let rawText = row.details || ''; if (rawText) rawText = rawText.replace(/台灣虎航/g, '🐯').replace(/虎航/g, '🐯');
            let globalCountry = row.country || '', globalCity = row.city || '', dateVal = row.date || '', airline = row.airline || '', priceVal = row.price || '', link = row.link || '';
            if (globalCity === rawText || globalCountry === rawText) { globalCountry = ''; globalCity = ''; dateVal = ''; airline = ''; priceVal = ''; }
            const inferred = inferInfoFromText(rawText);
            if (!globalCountry) globalCountry = inferred.country; if (!globalCity) globalCity = inferred.city; if (!airline) airline = inferred.title;
            const parsedItems = parseRawDetails(rawText, dateVal, priceVal);
            return parsedItems.map((item, subIndex) => {
              let finalCity = item.cityContext || globalCity, finalCountry = globalCountry;
              if (item.cityContext) finalCountry = getCountryByCity(item.cityContext) || globalCountry;
              if (!KNOWN_COUNTRIES.includes(finalCountry)) finalCountry = '其他';
              return { id: `ticket-${index}-${subIndex}`, country: finalCountry, city: finalCity, date: item.date, airline: item.titleContext || airline, price: item.price, details: rawText, link: link, isFlightAndHotel: item.isFlightAndHotel, isBogo: item.isBogo };
            });
          }).filter(t => t.date);
          const ticketMap = new Map(); allTickets.forEach(t => { const normTitle = normalizeForDedup(t.airline), key = `${t.date}_${t.city}_${normTitle}_${t.isFlightAndHotel}_${t.isBogo}`; ticketMap.set(key, t); }); state.tickets = Array.from(ticketMap.values());
        }
        if (data && data.tours) {
            let allTours = data.tours.flatMap((row, index) => {
              let rawText = row.details || ''; if (rawText) rawText = rawText.replace(/台灣虎航/g, '🐯').replace(/虎航/g, '🐯');
              let globalCountry = row.country || '', title = row.title || '', dateVal = row.date || '', days = row.days || '', priceVal = row.price || '', link = row.link || '';
              if (globalCountry === rawText || title === rawText) { globalCountry = ''; title = ''; dateVal = ''; days = ''; priceVal = ''; }
              const inferred = inferInfoFromText(rawText);
              if (!globalCountry) globalCountry = inferred.country; if (!title) title = inferred.title;
              if (!days) { const daysMatch = rawText.match(/(\d+)[天日]/); if (daysMatch) days = daysMatch[0]; }
              const parsedItems = parseRawDetails(rawText, dateVal, priceVal);
              return parsedItems.map((item, subIndex) => {
                let finalCountry = globalCountry; if (item.cityContext) finalCountry = getCountryByCity(item.cityContext) || globalCountry;
                if (!KNOWN_COUNTRIES.includes(finalCountry)) finalCountry = '其他';
                return { id: `tour-${index}-${subIndex}`, country: finalCountry, title: item.titleContext || title, date: item.date, days: days, price: item.price, details: rawText, link: link, isFlightAndHotel: item.isFlightAndHotel, isBogo: item.isBogo };
              });
            }).filter(t => t.date);
            const tourMap = new Map(); allTours.forEach(t => { const normTitle = normalizeForDedup(t.title), key = `${t.date}_${normTitle}_${t.isFlightAndHotel}_${t.isBogo}`; tourMap.set(key, t); }); state.tours = Array.from(tourMap.values());
        }
        sessionStorage.setItem(CACHE_KEY_TICKETS, JSON.stringify(state.tickets)); sessionStorage.setItem(CACHE_KEY_TOURS, JSON.stringify(state.tours)); sessionStorage.setItem(CACHE_TIME, now.toString());
      } catch (error) { 
        console.error('讀取 API 錯誤:', error); 
      } finally { 
        state.isLoading = false; 
        state.animateTransition = false; 
        renderMain(); 
      }
    }

          <!-- 團購/代購 (反灰敬請期待) -->
          <div class="relative w-full h-32 sm:h-40 rounded-3xl overflow-hidden cursor-not-allowed shadow-sm border border-gray-200">
            <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1200&q=80" loading="lazy" decoding="async" alt="團購代購" class="absolute inset-0 w-full h-full object-cover grayscale opacity-60"/>
            <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-[2px]"></div>
            <div class="absolute inset-0 flex flex-col justify-center items-center p-6 text-center">
              <i class="ph-bold ph-shopping-bag text-white text-3xl mb-2 drop-shadow-md"></i>
              <h3 class="text-xl sm:text-2xl font-black text-white mb-1 drop-shadow-lg">精選團購 ． 國外代購</h3>
              <span class="inline-block mt-2 px-3 py-1 bg-gray-800 text-gray-200 text-xs font-bold rounded-full border border-gray-500 shadow-sm">即將推出 敬請期待</span>
            </div>
          </div>
        </div>
      `;

      return `<div class="${state.animateTransition ? 'slide-in-from-bottom-4' : ''}"><div class="text-center max-w-2xl mx-auto mb-12"><h1 class="text-3xl font-black text-gray-900 mb-4 tracking-tight">找尋您的下一個目的地</h1><p class="text-gray-500">點擊國家探索最新晚鳥清艙機票</p></div><div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">${cardsHTML}</div>${bannersHTML}</div>`;
    }

    function getFlightsHTML() {
      const year = state.currentDate.getFullYear(), month = state.currentDate.getMonth(), activeTabObj = state.selectedCountryObj.tabs.find(t => t.label === state.selectedTab), allowedCities = activeTabObj ? activeTabObj.cities : [], filteredTickets = state.tickets.filter(t => (state.selectedCountryObj.country === '其他' ? t.country === '其他' : t.country === state.selectedCountryObj.country && allowedCities.includes(t.city)));
      
      const pillsHTML = state.selectedCountryObj.tabs.map(tab => { 
        let displayCities = tab.cities.filter(c => c !== tab.label && c !== '北海道' && c !== '沖繩' && c !== '其他航點'); 
        if (displayCities.length === 0) displayCities = tab.cities; 
        const subText = displayCities.slice(0, 2).join(' · '); 
        const isSelected = state.selectedTab === tab.label; 
        return `<button onclick="selectTab('${tab.label}')" class="flex flex-col items-center justify-center px-4 py-2 rounded-2xl border transition-all ${isSelected ? 'bg-gray-900 text-white border-gray-900 shadow-md' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'}"><span class="text-sm font-bold whitespace-nowrap">${tab.label}</span><span class="text-[10px] mt-0.5 font-medium whitespace-nowrap ${isSelected ? 'text-gray-300' : 'text-gray-400'}">${subText}</span></button>`; 
      }).join('');
      
      // -- 新增：旅遊應援站 (置於城市按鈕與月曆之間) --
      const supportStationHTML = `
        <div class="mb-8 p-4 sm:p-5 bg-gradient-to-r from-blue-50 to-cyan-50 rounded-2xl border border-blue-100 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4 fade-in relative overflow-hidden">
          <div class="absolute right-0 top-0 opacity-10 pointer-events-none transform translate-x-1/4 -translate-y-1/4">
            <i class="ph-fill ph-airplane-tilt text-9xl text-blue-500"></i>
          </div>
          <div class="flex items-center gap-2.5 text-blue-900 w-full md:w-auto relative z-10">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg shadow-sm">
              <i class="ph-bold ph-sparkle text-lg"></i>
            </div>
            <div>
              <div class="font-black text-sm tracking-wide">${state.selectedCountryObj.country} 旅遊應援站</div>
              <div class="text-xs text-blue-700/80 font-medium">出發前必備，為您備妥專屬優惠</div>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 w-full md:w-auto relative z-10">
            <a href="https://esimconnect.com.tw/#/access/esimbuy?referencecode=eddiewang" target="_blank" class="flex-1 md:flex-none flex items-center justify-center gap-1.5 bg-white hover:bg-blue-600 hover:text-white text-gray-700 px-4 py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all shadow-sm border border-gray-200 hover:border-transparent group">
              <i class="ph-fill ph-sim-card text-blue-500 group-hover:text-white transition-colors"></i> eSIM 9折
            </a>
            <a href="https://www.kkday.com/zh-tw?cid=22649" target="_blank" class="flex-1 md:flex-none flex items-center justify-center gap-1.5 bg-white hover:bg-[#26C2CD] hover:text-white text-gray-700 px-4 py-2.5 rounded-xl text-xs sm:text-sm font-bold transition-all shadow-sm border border-gray-200 hover:border-transparent group">
              <i class="ph-fill ph-ticket text-[#26C2CD] group-hover:text-white transition-colors"></i> KKday 特惠
            </a>
          </div>
        </div>
      `;

      let contentHTML = '';
      const calendarHeaderHTML = `
        <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 bg-white">
          <button onclick="prevMonth()" class="p-2 hover:bg-gray-100 rounded-full"><i class="ph-bold ph-caret-left"></i></button>
          <h2 class="text-lg font-bold">${year}年 ${month + 1}月</h2>
          <button onclick="nextMonth()" class="p-2 hover:bg-gray-100 rounded-full"><i class="ph-bold ph-caret-right"></i></button>
        </div>
      `;

      if (state.viewMode === 'list') {
         const todayStr = new Date().toISOString().split('T')[0], upcoming = filteredTickets.filter(t => t.date >= todayStr).sort((a,b) => (parseInt((a.price||'').replace(/\D/g, '')) || 999999) - (parseInt((b.price||'').replace(/\D/g, '')) || 999999));
         contentHTML = upcoming.length === 0 ? `<div class="py-20 text-center text-gray-500 bg-white rounded-3xl border border-gray-100 shadow-sm"><i class="ph-bold ph-airplane-tilt text-4xl text-gray-300 mb-3"></i>目前暫無機票！</div>` : `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">${upcoming.map(t => `<div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md cursor-pointer flex justify-between items-center" onclick="window.openModalFromItem('${encodeURIComponent(JSON.stringify(t))}')"><div><div class="text-xs font-bold text-gray-500 mb-1.5 flex items-center gap-1.5"><i class="ph-bold ph-calendar-blank text-gray-400"></i> ${t.date}</div><div class="font-black text-gray-900 text-lg line-clamp-1">${t.airline}</div><div class="text-xs font-medium text-gray-600 mt-1.5 bg-gray-50 inline-block px-2 py-1 rounded-md border border-gray-100">${t.city}${t.isFlightAndHotel ? ' · 機+酒' : ''}${t.isBogo ? ' · 買一送一' : ''}</div></div><div class="text-right shrink-0 ml-4"><div class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">優惠價</div><div class="text-xl font-black text-red-500">$${t.price || '--'}</div></div></div>`).join('')}</div>`;
      } else {
        const prefix = `${year}-${String(month + 1).padStart(2, '0')}`, monthTickets = filteredTickets.filter(t => t.date.startsWith(prefix));
        
        if (monthTickets.length === 0) {
          contentHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
              ${calendarHeaderHTML}
              <div class="py-24 text-center text-gray-500">
                <i class="ph-bold ph-calendar-x text-5xl text-gray-300 mb-4"></i>
                <p class="font-bold text-gray-700 text-lg mb-2">這個月暫時沒有清艙機票唷！</p>
                <p class="text-sm">請點擊上方箭頭看看其他月份，或改用「列表模式」</p>
              </div>
            </div>
          `;
        } else {
          let blanks = Array(new Date(year, month, 1).getDay()).fill(null), days = Array.from({ length: new Date(year, month+1, 0).getDate() }, (_, i) => i + 1);
          contentHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
              ${calendarHeaderHTML}
              <div class="grid grid-cols-7 gap-px bg-gray-100 border-b border-gray-100">
                ${['日', '一', '二', '三', '四', '五', '六'].map(d => `<div class="bg-white py-3 text-center text-xs font-bold text-gray-400">${d}</div>`).join('')}
              </div>
              <div class="grid grid-cols-7 gap-px bg-gray-100">
                ${blanks.map(() => `<div class="bg-white/50 min-h-[80px]"></div>`).join('')}${days.map(d => { 
                  const dateStr = `${prefix}-${String(d).padStart(2, '0')}`, dayTickets = filteredTickets.filter(t => t.date === dateStr); 
                  return `
                    <div class="bg-white min-h-[80px] p-1 transition-all ${dayTickets.length ? 'cursor-pointer hover:bg-blue-50/50' : 'text-gray-400'}" ${dayTickets.length ? `onclick="openModal('${dateStr}')"` : ''}>
                      <div class="text-[10px] sm:text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full mb-1 ${dateStr === new Date().toISOString().split('T')[0] ? 'bg-gray-900 text-white' : 'text-gray-700'}">${d}</div>
                      <div class="flex flex-col gap-1">
                        ${dayTickets.map(t => {
                          const extraLabel = (t.isFlightAndHotel ? ' 機+酒' : '') + (t.isBogo ? ' 買一送一' : '');
                          return `<div class="text-[9px] px-0.5 py-0.5 ${t.isFlightAndHotel ? 'bg-purple-50 text-purple-700' : 'bg-blue-50 text-blue-700'} rounded font-black tracking-tighter text-center flex flex-col items-center"><span class="whitespace-nowrap">${t.price || '有票'}</span>${extraLabel ? `<span class="text-[7px] leading-none opacity-80">${extraLabel}</span>` : ''}</div>`;
                        }).join('')}
                      </div>
                    </div>`; 
                }).join('')}
              </div>
            </div>
          `;
        }
      }
      // 將 supportStationHTML 插入到城市選擇與月曆之間
      return `<div class="fade-in"><div class="flex items-center justify-between mb-8 flex-wrap"><div class="flex items-center gap-4"><button onclick="goHome()" class="p-2.5 bg-white border border-gray-200 rounded-full flex items-center justify-center"><i class="ph-bold ph-arrow-left"></i></button><h1 class="text-xl font-bold">${state.selectedCountryObj.country} 清艙機票</h1></div><div class="flex items-center bg-gray-100 p-1 rounded-xl"><button onclick="setViewMode('calendar')" class="px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${state.viewMode==='calendar' ? 'bg-white shadow-sm':'text-gray-500'}"><i class="ph-bold ph-calendar-blank"></i>月曆</button><button onclick="setViewMode('list')" class="px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${state.viewMode==='list' ? 'bg-white shadow-sm':'text-gray-500'}"><i class="ph-bold ph-list-dashes"></i>列表</button></div></div><div class="flex flex-wrap gap-2.5 mb-8">${pillsHTML}</div>${supportStationHTML}${contentHTML}</div>`;
    }

    function renderModal() {
      const modalRoot = document.getElementById('modal-root');
      if (!state.isModalOpen || !state.selectedDateTickets) { modalRoot.innerHTML = ''; return; }
      const contentHTML = state.selectedDateTickets.tickets.map((item, index) => {
        const lineOaUrl = `https://line.me/R/oaMessage/${LINE_OFFICIAL_ID}/?${encodeURIComponent('清艙機票訂購公版\n備註：eddie推薦(不可刪)\n航空航點：' + item.airline + ' ' + item.country + item.city + '\n日期：' + item.date + '\n金額：' + (item.price ? '$' + item.price : '') + '\n姓名：\n張數：\n聯絡電話：\n聯絡信箱：')}`;
        const extraLabels = (item.isFlightAndHotel ? ' · 機+酒' : '') + (item.isBogo ? ' · 買一送一' : '');
        const urlMatch = item.details.match(/(https?:\/\/reurl\.cc\/[^\s]+|https?:\/\/[^\s]+)/);
        
        return `
          <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm ${index !== 0 ? 'mt-4' : ''}">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="inline-flex items-center gap-1 bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded-md mb-2">${item.country} · ${item.city}${extraLabels}</span>
                <h4 class="text-lg font-black text-gray-900">${item.airline}</h4>
              </div>
              ${item.price ? `<div class="text-right text-xl font-black text-red-500">$${item.price}</div>` : ''}
            </div>
            <div class="bg-gray-50 p-4 rounded-xl text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${item.details}</div>
            
            <div class="mt-3 flex items-start gap-1.5 text-[11px] text-gray-400 leading-tight">
              <i class="ph-bold ph-info text-xs mt-0.5 shrink-0"></i>
              <span>機位剩餘數量依旅行社即時查詢為準，點擊下方按鈕後請儘速聯絡確認名額。</span>
            </div>

            <!-- 情境變現置入：高轉換率版位 -->
            <div class="mt-5 p-3.5 bg-gradient-to-r from-gray-900 to-gray-800 rounded-xl flex items-center justify-between shadow-md cursor-pointer hover:scale-[1.02] transition-transform border border-gray-700" onclick="window.open('https://esimconnect.com.tw/#/access/esimbuy?referencecode=eddiewang', '_blank')">
              <div class="flex flex-col">
                <span class="text-yellow-400 text-[10px] font-bold mb-0.5 tracking-wider flex items-center gap-1">
                  <i class="ph-fill ph-lightbulb"></i> 訂好機票了嗎？
                </span>
                <span class="text-white text-sm font-black">領取艾迪王專屬 eSIM 優惠</span>
              </div>
              <div class="bg-white/20 p-1.5 rounded-lg text-white">
                <i class="ph-bold ph-caret-right"></i>
              </div>
            </div>

            ${(item.isTours && urlMatch) ? `<a href="${urlMatch[0]}" target="_blank" rel="noreferrer" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm"><i class="ph-bold ph-notebook text-xl"></i> 查看行程資訊</a>` : ''}
            <a href="${item.link || lineOaUrl}" target="_blank" rel="noreferrer" class="mt-3 w-full text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm ${item.link ? 'bg-orange-600 shadow-orange-200' : 'bg-[#06C755] shadow-green-200'}"><i class="ph-bold ${item.link ? 'ph-arrow-square-out' : 'ph-chat-circle-dots'} text-xl"></i> ${item.link ? '前往指定報名網頁' : '聯繫合作旅行社 LINE 搶購'}</a>
          </div>
        `;
      }).join('');
      modalRoot.innerHTML = `<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in" onclick="if(e.target===this) closeModal()"><div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden zoom-in-95 relative flex flex-col max-h-[85vh]"><div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between shrink-0"><h3 class="text-xl font-bold text-gray-900 flex items-center gap-2"><i class="ph-bold ph-calendar-blank text-gray-400"></i> ${state.selectedDateTickets.date}</h3><button onclick="closeModal()" class="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-full flex items-center justify-center"><i class="ph-bold ph-x text-xl"></i></button></div><div class="p-6 overflow-y-auto bg-gray-50/50 flex-1 no-scrollbar">${contentHTML}</div></div></div>`;
    }

    // 更新主渲染邏輯：將首頁渲染與 API 等待解耦
    function renderMain() { 
      const el = document.getElementById('main-content'); 
      
      // 如果還沒有選任何國家/搜尋，就一律顯示「首頁」，就算還在 isLoading 也是！
      if (!state.selectedCountryObj && !state.searchQuery) {
        el.innerHTML = getHomeHTML();
      } 
      // 如果已經點擊了國家/搜尋，但資料還沒準備好，才顯示大範圍骨架屏
      else if (state.isLoading) {
        el.innerHTML = getLoadingHTML(); 
      } 
      else if (state.searchQuery || state.selectedCountryObj?.isSearch) {
        el.innerHTML = getSearchHTML(); 
      } 
      else {
        el.innerHTML = getFlightsHTML(); 
      }
    }

    // --- 啟動邏輯：從英文 Slug 還原中文標籤 ---
    window.addEventListener('DOMContentLoaded', () => { 
      const p = new URLSearchParams(location.search), 
            countrySlug = p.get('country'), 
            tabSlug = p.get('tab'), 
            q = p.get('q'); 

      if (q) { 
        state.searchQuery = q; state.selectedCountryObj = { isSearch: true }; 
        document.getElementById('searchInput').value = q; 
      } 
      else if (countrySlug) { 
        const countryObj = LOCATION_DATA.find(x => x.slug === countrySlug); 
        if (countryObj) { 
          state.selectedCountryObj = countryObj; 
          const tabObj = countryObj.tabs.find(t => t.slug === tabSlug);
          state.selectedTab = tabObj ? tabObj.label : countryObj.tabs[0].label; 
        } 
      } 
      
      // 觸發取資料，但在這之前 renderMain() 已經會先被呼叫畫出首頁了
      fetchSheetData(); 
    });
  </script>
</body>
</html>
