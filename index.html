  <script>
    // --- 參數設定 ---
    const SHEET_ID = '11K6w4hIwjTdUz1nJo4nt6i0GMC7QujZD8Mky4yy0zZ8';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    
    // 👉 請在這裡填寫旅行社的 LINE 官方帳號 ID (記得包含 @)
    const LINE_OFFICIAL_ID = '@616fwicf'; 

    const LOCATION_DATA = [
      {
        country: '日本',
        image: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80',
        cities: ['東京', '大阪', '沖繩', '北海道', '石垣島', '名古屋', '仙台', '花卷', '新潟', '秋田', '高松', '福岡', '宮古島', '高知', '熊本']
      },
      {
        country: '韓國',
        image: 'https://images.unsplash.com/photo-1546874177-9e664107314e?auto=format&fit=crop&w=800&q=80',
        cities: ['首爾', '釜山', '濟州島']
      },
      {
        country: '泰國',
        image: 'https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?auto=format&fit=crop&w=800&q=80',
        cities: ['曼谷', '清邁', '普吉島']
      },
      {
        country: '越南',
        image: 'https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=800&q=80',
        cities: ['峴港', '胡志明市', '河內', '富國島']
      },
      {
        country: '其他',
        image: 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=800&q=80',
        cities: ['其他航點']
      }
    ];

    // --- 機場與別名對照表 (Alias Dictionary) ---
    // 當文字中出現 key 陣列中的詞彙時，會自動映射為對應的標準 value
    const CITY_ALIASES = [
      // 韓國
      { standard: '首爾', aliases: ['首爾', '仁川', '金浦'] },
      { standard: '釜山', aliases: ['釜山', '金海'] },
      { standard: '濟州島', aliases: ['濟州島', '濟州', 'CJU'] },
      
      // 日本
      { standard: '東京', aliases: ['東京', '成田', '羽田', 'NRT', 'HND'] },
      { standard: '大阪', aliases: ['大阪', '關西', '關空', 'KIX'] },
      { standard: '北海道', aliases: ['北海道', '札幌', '新千歲', '函館', '旭川', '千歲', 'CTS'] },
      { standard: '沖繩', aliases: ['沖繩', '那霸', '琉球', 'OKA'] },
      { standard: '名古屋', aliases: ['名古屋', '中部國際', 'NGO'] },
      { standard: '福岡', aliases: ['福岡', 'FUK'] },
      { standard: '熊本', aliases: ['熊本', 'KMJ', '阿蘇熊本'] },
      
      // 泰國
      { standard: '曼谷', aliases: ['曼谷', '蘇凡納布', 'BKK', '廊曼', 'DMK'] },
      { standard: '清邁', aliases: ['清邁', 'CNX'] },
      
      // 越南
      { standard: '胡志明市', aliases: ['胡志明', '新山一', 'SGN'] },
      { standard: '河內', aliases: ['河內', '內排', 'HAN'] },
      { standard: '峴港', aliases: ['峴港', 'DAD'] }
    ];

    // --- 狀態管理 (State) ---
    const state = {
      tickets: [],
      tours: [],
      isLoading: true,
      selectedCountryObj: null,
      selectedCity: null,
      selectedTourCountry: '全部', // 旅行團的國家篩選
      currentDate: new Date(),
      selectedDateTickets: null,
      isModalOpen: false,
      animateTransition: true
    };

    // --- 智慧文字解析邏輯 (自動推導國家、城市與精準標題) ---
    function inferInfoFromText(text) {
      let title = '未命名行程';
      let country = '其他';
      let city = '其他航點';
      
      if (!text) return { title, country, city };

      const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');

      // 偵測城市與國家 (進階版：包含 Alias 偵測)
      let foundCity = false;
      
      // 1. 先透過別名對照表找城市
      for (let mapping of CITY_ALIASES) {
        for (let alias of mapping.aliases) {
          if (text.includes(alias)) {
            city = mapping.standard;
            foundCity = true;
            break;
          }
        }
        if (foundCity) break;
      }

      // 2. 如果還是沒找到，再用 LOCATION_DATA 裡面的清單找一次 (雙重保險)
      if (!foundCity) {
        for (let loc of LOCATION_DATA) {
          for (let c of loc.cities) {
            if (text.includes(c)) {
              city = c;
              foundCity = true;
              break;
            }
          }
          if (foundCity) break;
        }
      }

      // 3. 找到城市後，反推國家
      if (foundCity) {
        for (let loc of LOCATION_DATA) {
          if (loc.cities.includes(city)) {
            country = loc.country;
            break;
          }
        }
      } else {
        // 如果連城市都沒找到，找找看有沒有國家關鍵字
        for (let loc of LOCATION_DATA) {
          if (text.includes(loc.country)) {
            country = loc.country;
            break;
          }
        }
      }

      // 找尋最適合的標題 (打分機制)
      let bestTitle = '';
      let titleScore = -1; // 分數越高越有可能是標題

      for (let line of lines) {
        // 過濾掉純表情符號、純標點符號，或者是常見的無意義宣傳字眼
        const isFluff = /^[\p{Emoji}\s❗️🔥✨⭐⚡️]+$/u.test(line) || line.includes('最後機會') || line.includes('清艙促銷') || line.includes('預估');
        if (isFluff) continue;

        let score = 0;
        // 如果這行文字包含對應的城市或其別名，它有極高的機率就是標題
        let lineContainsCityRelated = false;
        
        // 檢查標準城市名
        if (city !== '其他航點' && line.includes(city)) {
          lineContainsCityRelated = true;
        }
        // 檢查該城市的別名 (如果有的話)
        if (!lineContainsCityRelated && city !== '其他航點') {
          const mapping = CITY_ALIASES.find(m => m.standard === city);
          if (mapping) {
            for(let alias of mapping.aliases) {
               if(line.includes(alias)) {
                 lineContainsCityRelated = true;
                 break;
               }
            }
          }
        }

        if (lineContainsCityRelated) {
          score = 2;
        } else if (country !== '其他' && line.includes(country)) {
          score = 1;
        }

        if (score > titleScore) {
          bestTitle = line;
          titleScore = score;
        }
      }

      if (bestTitle) {
        // 清理標題周圍的 emoji 與多餘符號
        title = bestTitle.replace(/^[\p{Emoji}\s❗️🔥✨⭐⚡️]+|[\p{Emoji}\s❗️🔥✨⭐⚡️]+$/gu, '');
      } else if (lines.length > 0) {
        title = lines[0]; // 如果真的找不到，才退回使用第一行
      }

      return { title, country, city };
    }

    // --- 智慧文字解析邏輯 (將多筆日期/金額從整段文字中拆分) ---
    function parseRawDetails(details, fallbackDate, fallbackPrice) {
      if (!details) return [{ date: fallbackDate, price: fallbackPrice }];

      const lines = details.split('\n');
      const items = [];
      const currentYear = new Date().getFullYear();
      const currentMonth = new Date().getMonth() + 1;

      for (let line of lines) {
        // 尋找價格 (尋找包含 $ 或 ＄ 的金額，例如 $ 11,800)
        const priceMatch = line.match(/(?:NT\$|\$|＄)\s*([0-9,]+)/i);

        if (priceMatch) {
          let price = priceMatch[1]; // 保留逗號格式
          
          // 升級版：尋找該行裡「所有的」日期 (例如解決 3/16、3/20、3/21 同在一行的情況)
          const dateRegex = /(?:(\d{4})[\/\-])?(\d{1,2})[\/\-](\d{1,2})/g;
          let match;
          let foundDateInLine = false;

          // 使用 while 迴圈把該行出現過的所有符合的日期都抓出來
          while ((match = dateRegex.exec(line)) !== null) {
            foundDateInLine = true;
            let year = match[1] ? parseInt(match[1], 10) : currentYear;
            let month = parseInt(match[2], 10);
            let day = parseInt(match[3], 10);
            
            // 如果沒有給年份，且月份已經過了很久(例如現在8月，文字寫1月)，就推測是明年的機票
            if (!match[1] && month < currentMonth - 2) {
              year = currentYear + 1;
            }
            
            let dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            items.push({ date: dateStr, price: price });
          }
        }
      }

      // 如果有解析到任何「同時包含日期與價格」的行，就回傳解析結果 (一拆多)
      if (items.length > 0) {
        return items;
      } else {
        // 如果沒有，就回傳原本表格欄位填寫的單筆日期與價格
        return [{ date: fallbackDate, price: fallbackPrice }];
      }
    }

    // --- 資料串接邏輯 (Google Sheets) ---
    async function fetchSheetData() {
      state.isLoading = true;
      renderMain();
      try {
        const cacheBuster = `&cache=${new Date().getTime()}`;
        
        // 1. 讀取機票資料
        const resFlights = await fetch(SHEET_URL + cacheBuster);
        const textFlights = await resFlights.text();
        const jsonStrFlights = textFlights.substring(textFlights.indexOf('{'), textFlights.lastIndexOf('}') + 1);
        const dataFlights = JSON.parse(jsonStrFlights);

        if (dataFlights && dataFlights.table && dataFlights.table.rows) {
          state.tickets = dataFlights.table.rows.slice(1).flatMap((row, index) => {
            // 防呆：支援貼在F欄(詳細說明)或是直接整坨貼在A欄
            let rawText = row.c[5]?.v || '';
            if (!rawText && row.c[0]?.v && String(row.c[0].v).includes('\n')) {
              rawText = row.c[0].v;
            }

            let country = row.c[0]?.v || '';
            let city = row.c[1]?.v || '';
            let dateVal = row.c[2]?.f || row.c[2]?.v || '';
            let airline = row.c[3]?.v || '';
            let priceVal = row.c[4]?.v || row.c[4]?.f || '';
            let link = row.c[6]?.v || '';

            // 如果是把整坨貼在 A 欄，清空其他錯誤對應的欄位以便重新推導
            if (rawText === row.c[0]?.v) {
              country = ''; city = ''; dateVal = ''; airline = ''; priceVal = '';
            }

            // 智慧推導：如果沒填國家城市，從內文自動抓
            const inferred = inferInfoFromText(rawText);
            if (!country) country = inferred.country;
            if (!city) city = inferred.city;
            if (!airline) airline = inferred.title;

            const parsedItems = parseRawDetails(rawText, String(dateVal).replace(/\//g, '-'), priceVal);

            return parsedItems.map((item, subIndex) => ({
              id: `ticket-${index}-${subIndex}`,
              country: country,
              city: city,
              date: item.date,
              airline: airline,
              price: item.price,
              details: rawText, // 保留完整原始文字
              link: link
            }));
          }).filter(t => t.date); // 必須要有日期才顯示在月曆
        }

        // 2. 讀取旅行團資料
        try {
          const sheetName = encodeURIComponent('旅行團');
          const resTours = await fetch(`${SHEET_URL}&sheet=${sheetName}${cacheBuster}`);
          const textTours = await resTours.text();
          const jsonStrTours = textTours.substring(textTours.indexOf('{'), textTours.lastIndexOf('}') + 1);
          const dataTours = JSON.parse(jsonStrTours);
          
          if (dataTours && dataTours.table && dataTours.table.rows) {
            state.tours = dataTours.table.rows.slice(1).flatMap((row, index) => {
              // 防呆：支援貼在F欄(詳細說明)或是直接整坨貼在A欄
              let rawText = row.c[5]?.v || '';
              if (!rawText && row.c[0]?.v && String(row.c[0].v).includes('\n')) {
                rawText = row.c[0].v;
              }

              let country = row.c[0]?.v || '';
              let title = row.c[1]?.v || '';
              let dateVal = row.c[2]?.f || row.c[2]?.v || '';
              let days = row.c[3]?.v || '';
              let priceVal = row.c[4]?.v || row.c[4]?.f || '';
              let link = row.c[6]?.v || '';

              // 如果是把整坨貼在 A 欄，清空其他錯誤對應的欄位以便重新推導
              if (rawText === row.c[0]?.v) {
                country = ''; title = ''; dateVal = ''; days = ''; priceVal = '';
              }

              // 智慧推導：如果沒填國家城市，從內文自動抓
              const inferred = inferInfoFromText(rawText);
              if (!country) country = inferred.country;
              if (!title) title = inferred.title;

              // 若內文包含 "X天" 或 "X日"，順便自動推導天數標籤
              if (!days) {
                const daysMatch = rawText.match(/(\d+)[天日]/);
                if (daysMatch) days = daysMatch[0]; // 例如 "6日"
              }

              const parsedItems = parseRawDetails(rawText, String(dateVal).replace(/\//g, '-'), priceVal);

              return parsedItems.map((item, subIndex) => ({
                id: `tour-${index}-${subIndex}`,
                country: country,
                title: title,
                date: item.date,
                days: days,
                price: item.price,
                details: rawText,
                link: link
              }));
            }).filter(t => t.date);
          }
        } catch (e) {
          console.error('旅行團資料讀取失敗:', e);
        }

      } catch (error) {
        console.error('讀取 Google Sheet 錯誤:', error);
      } finally {
        state.isLoading = false;
        state.animateTransition = true;
        renderMain();
        state.animateTransition = false;
      }
    }

    // --- 事件處理函式 ---
    window.goHome = () => {
      state.selectedCountryObj = null;
      state.selectedCity = null;
      state.currentDate = new Date(); // 重置為當前真實月份
      state.animateTransition = true;
      renderMain();
      state.animateTransition = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.selectCountry = (index) => {
      if (index === 'tours') {
        state.selectedCountryObj = { isTours: true };
        state.selectedTourCountry = '全部'; // 進入旅行團時預設為全部
      } else {
        state.selectedCountryObj = LOCATION_DATA[index];
        state.selectedCity = LOCATION_DATA[index].cities[0];
      }
      state.currentDate = new Date(); // 點擊國家或旅行團時，重置為當前月份
      state.animateTransition = true;
      renderMain();
      state.animateTransition = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.selectCity = (city) => {
      state.selectedCity = city;
      state.currentDate = new Date(); // 切換城市時，重置為當前月份
      state.animateTransition = false;
      renderMain();
    };

    // 旅行團的國家切換
    window.selectTourCountry = (country) => {
      state.selectedTourCountry = country;
      state.currentDate = new Date(); // 切換國家時，重置為當前月份
      state.animateTransition = false;
      renderMain();
    };

    window.prevMonth = () => {
      state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() - 1, 1);
      state.animateTransition = false;
      renderMain();
    };

    window.nextMonth = () => {
      state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + 1, 1);
      state.animateTransition = false;
      renderMain();
    };

    window.openModal = (dateStr) => {
      if (state.selectedCountryObj.isTours) {
        // 旅行團月曆的點擊
        const filteredTours = state.selectedTourCountry === '全部' 
          ? state.tours 
          : state.tours.filter(t => t.country === state.selectedTourCountry);
        const dayTours = filteredTours.filter(t => t.date === dateStr);
        
        if (dayTours.length > 0) {
          state.selectedDateTickets = { date: dateStr, tickets: dayTours, isTours: true };
          state.isModalOpen = true;
          renderModal();
        }
      } else {
        // 機票月曆的點擊
        const dayTickets = state.tickets.filter(t => t.country === state.selectedCountryObj.country && t.city === state.selectedCity && t.date === dateStr);
        if (dayTickets.length > 0) {
          state.selectedDateTickets = { date: dateStr, tickets: dayTickets, isTours: false };
          state.isModalOpen = true;
          renderModal();
        }
      }
    };

    window.closeModal = () => {
      state.isModalOpen = false;
      renderModal();
    };

    // --- 渲染邏輯 (UI 產生器) ---
    
    function getLoadingHTML() {
      return `
        <div class="flex flex-col items-center justify-center py-32 fade-in">
          <i class="ph-bold ph-airplane-tilt text-5xl text-gray-300 mb-4 animate-bounce"></i>
          <p class="text-gray-500 font-medium">正在同步最新資料...</p>
        </div>
      `;
    }

    function getHomeHTML() {
      let cardsHTML = LOCATION_DATA.map((loc, index) => `
        <div 
          onclick="selectCountry(${index})"
          class="group relative h-64 rounded-3xl overflow-hidden cursor-pointer shadow-sm hover:shadow-xl transition-all duration-300"
        >
          <img src="${loc.image}" alt="${loc.country}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
          <div class="absolute inset-0 bg-gradient-to-t from-gray-900/80 via-gray-900/20 to-transparent transition-opacity group-hover:opacity-90"></div>
          <div class="absolute bottom-0 left-0 p-6">
            <h3 class="text-2xl font-bold text-white mb-1 flex items-center gap-2">
              <i class="ph-bold ph-map-pin text-white/80"></i> ${loc.country}
            </h3>
            <p class="text-white/70 text-sm font-medium">包含 ${loc.cities.length} 個熱門航點</p>
          </div>
        </div>
      `).join('');

      cardsHTML += `
        <div 
          onclick="selectCountry('tours')"
          class="group relative h-64 rounded-3xl overflow-hidden cursor-pointer shadow-sm hover:shadow-xl transition-all duration-300 ring-2 ring-transparent hover:ring-blue-500/50"
        >
          <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?auto=format&fit=crop&w=800&q=80" alt="優惠旅行團" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
          <div class="absolute inset-0 bg-gradient-to-t from-gray-900/90 via-gray-900/30 to-transparent transition-opacity group-hover:opacity-90"></div>
          <div class="absolute bottom-0 left-0 p-6 w-full">
            <div class="flex items-center gap-2 mb-1">
              <div class="bg-blue-600 p-1.5 rounded-lg text-white flex items-center justify-center">
                <i class="ph-bold ph-briefcase"></i>
              </div>
              <h3 class="text-2xl font-bold text-white">優惠旅行團</h3>
            </div>
            <p class="text-white/80 text-sm font-medium">精選高 CP 值套裝行程</p>
          </div>
        </div>
      `;

      return `
        <div class="${state.animateTransition ? 'slide-in-from-bottom-4' : ''}">
          <div class="text-center max-w-2xl mx-auto mb-12">
            <h1 class="text-3xl font-black text-gray-900 mb-4 tracking-tight">找尋您的下一個目的地</h1>
            <p class="text-gray-500">點擊國家探索最新晚鳥清艙機票，或查看精選旅行團</p>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            ${cardsHTML}
          </div>
        </div>
      `;
    }

    // 將旅行團轉換為月曆視圖
    function getToursHTML() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      // 直接使用所有的旅行團資料，不進行國家篩選
      const filteredTours = state.tours;

      let blanksHTML = '';
      for (let i = 0; i < firstDay; i++) {
        blanksHTML += `<div class="bg-white/50 min-h-[80px] sm:min-h-[100px] p-1 sm:p-2"></div>`;
      }

      let daysHTML = '';
      const todayStr = new Date().toISOString().split('T')[0];

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dayTours = filteredTours.filter(t => t.date === dateStr);
        const hasTours = dayTours.length > 0;
        const isToday = todayStr === dateStr;

        // 升級版：只顯示金額，字體加黑讓它更清楚
        let toursHTML = dayTours.map(tour => {
          return `
            <div class="text-[11px] sm:text-[13px] px-1 py-1.5 bg-orange-50 text-orange-700 rounded sm:rounded-md truncate font-black border border-orange-100/50 shadow-sm text-center leading-tight">
              ${tour.price ? '$'+tour.price : '有團'}
            </div>
          `;
        }).join('');

        daysHTML += `
          <div 
            class="bg-white min-h-[80px] sm:min-h-[110px] p-1 sm:p-2 transition-all relative group ${hasTours ? 'cursor-pointer hover:bg-orange-50/50' : 'text-gray-400'}"
            ${hasTours ? `onclick="openModal('${dateStr}')"` : ''}
          >
            <div class="text-xs sm:text-sm font-semibold inline-flex items-center justify-center w-6 h-6 sm:w-7 sm:h-7 rounded-full mb-1 ${isToday ? 'bg-gray-900 text-white' : 'text-gray-700'}">
              ${d}
            </div>
            <div class="flex flex-col gap-1 sm:gap-1.5">${toursHTML}</div>
          </div>
        `;
      }

      return `
        <div class="${state.animateTransition ? 'slide-in-from-right-8' : ''}">
          <div class="flex items-center gap-4 mb-8">
            <button onclick="goHome()" class="p-2.5 bg-white border border-gray-200 rounded-full text-gray-600 hover:bg-gray-50 transition-colors shadow-sm flex items-center justify-center">
              <i class="ph-bold ph-arrow-left text-xl"></i>
            </button>
            <div>
              <h1 class="text-2xl font-bold text-gray-900">精選優惠旅行團</h1>
              <p class="text-sm text-gray-500 mt-1">為您挑選最高 CP 值的套裝行程，輕鬆出遊沒煩惱</p>
            </div>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden ${state.animateTransition ? 'fade-in' : ''}">
            <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 bg-white">
              <button onclick="prevMonth()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600 flex items-center justify-center">
                <i class="ph-bold ph-caret-left text-xl"></i>
              </button>
              <h2 class="text-lg font-bold text-gray-800 tracking-wider">
                ${year}年 ${month + 1}月
              </h2>
              <button onclick="nextMonth()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600 flex items-center justify-center">
                <i class="ph-bold ph-caret-right text-xl"></i>
              </button>
            </div>
            
            <div class="grid grid-cols-7 gap-px bg-gray-100 border-b border-gray-100">
              ${['日', '一', '二', '三', '四', '五', '六'].map(day => `<div class="bg-white py-2 sm:py-3 text-center text-[10px] sm:text-xs font-bold text-gray-400">${day}</div>`).join('')}
            </div>

            <div class="grid grid-cols-7 gap-px bg-gray-100">
              ${blanksHTML}
              ${daysHTML}
            </div>
          </div>
        </div>
      `;
    }

    function getFlightsHTML() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const filteredTickets = state.tickets.filter(t => t.country === state.selectedCountryObj.country && t.city === state.selectedCity);

      let blanksHTML = '';
      for (let i = 0; i < firstDay; i++) {
        blanksHTML += `<div class="bg-white/50 min-h-[80px] sm:min-h-[100px] p-1 sm:p-2"></div>`;
      }

      let daysHTML = '';
      const todayStr = new Date().toISOString().split('T')[0];

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dayTickets = filteredTickets.filter(t => t.date === dateStr);
        const hasTickets = dayTickets.length > 0;
        const isToday = todayStr === dateStr;

        // 升級版：只顯示金額，字體加黑讓它更清楚
        let ticketsHTML = dayTickets.map(ticket => `
          <div class="text-[11px] sm:text-[13px] px-1 py-1.5 bg-blue-50 text-blue-700 rounded sm:rounded-md truncate font-black border border-blue-100/50 shadow-sm text-center leading-tight">
            ${ticket.price ? '$'+ticket.price : '有票'}
          </div>
        `).join('');

        daysHTML += `
          <div 
            class="bg-white min-h-[80px] sm:min-h-[110px] p-1 sm:p-2 transition-all relative group ${hasTickets ? 'cursor-pointer hover:bg-blue-50/50' : 'text-gray-400'}"
            ${hasTickets ? `onclick="openModal('${dateStr}')"` : ''}
          >
            <div class="text-xs sm:text-sm font-semibold inline-flex items-center justify-center w-6 h-6 sm:w-7 sm:h-7 rounded-full mb-1 ${isToday ? 'bg-gray-900 text-white' : 'text-gray-700'}">
              ${d}
            </div>
            <div class="flex flex-col gap-1 sm:gap-1.5">${ticketsHTML}</div>
          </div>
        `;
      }

      const pillsHTML = state.selectedCountryObj.cities.map(city => `
        <button
          onclick="selectCity('${city}')"
          class="px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${state.selectedCity === city ? 'bg-gray-900 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:border-gray-300 hover:bg-gray-50'}"
        >
          ${city}
        </button>
      `).join('');

      return `
        <div class="${state.animateTransition ? 'slide-in-from-right-8' : ''}">
          <div class="flex items-center gap-4 mb-8">
            <button onclick="goHome()" class="p-2.5 bg-white border border-gray-200 rounded-full text-gray-600 hover:bg-gray-50 transition-colors shadow-sm flex items-center justify-center">
              <i class="ph-bold ph-arrow-left text-xl"></i>
            </button>
            <div>
              <h1 class="text-2xl font-bold text-gray-900">${state.selectedCountryObj.country} 清艙機票</h1>
              <p class="text-sm text-gray-500 mt-1">請選擇欲查詢的城市</p>
            </div>
          </div>

          <div class="flex flex-wrap gap-2.5 mb-8">
            ${pillsHTML}
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden ${state.animateTransition ? 'fade-in' : ''}">
            <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 bg-white">
              <button onclick="prevMonth()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600 flex items-center justify-center">
                <i class="ph-bold ph-caret-left text-xl"></i>
              </button>
              <h2 class="text-lg font-bold text-gray-800 tracking-wider">
                ${year}年 ${month + 1}月
              </h2>
              <button onclick="nextMonth()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600 flex items-center justify-center">
                <i class="ph-bold ph-caret-right text-xl"></i>
              </button>
            </div>
            
            <div class="grid grid-cols-7 gap-px bg-gray-100 border-b border-gray-100">
              ${['日', '一', '二', '三', '四', '五', '六'].map(day => `<div class="bg-white py-2 sm:py-3 text-center text-[10px] sm:text-xs font-bold text-gray-400">${day}</div>`).join('')}
            </div>

            <div class="grid grid-cols-7 gap-px bg-gray-100">
              ${blanksHTML}
              ${daysHTML}
            </div>
          </div>
        </div>
      `;
    }

    function renderModal() {
      const modalRoot = document.getElementById('modal-root');
      if (!state.isModalOpen || !state.selectedDateTickets) {
        modalRoot.innerHTML = '';
        return;
      }

      const isTours = state.selectedDateTickets.isTours;

      const contentHTML = state.selectedDateTickets.tickets.map((item, index) => {
        const title = isTours ? item.title : item.airline;
        const subtitle = isTours 
          ? `<i class="ph-bold ph-map-pin"></i> ${item.country} ${item.days ? '· ' + item.days : ''}` 
          : `${item.country} · ${item.city}`;
        
        const isKKday = (title && title.toLowerCase().includes('kkday')) || (item.link && item.link.toLowerCase().includes('kkday'));
        
        // ----------------------------------------------------
        // 製作 LINE 官方帳號的動態帶入訊息公版 (URL Encode 處理)
        // ----------------------------------------------------
        const orderType = isTours ? '優惠旅行團' : '清艙機票';
        const tourOrAirline = isTours ? item.title : `${item.airline} ${item.country}${item.city}`;
        const priceText = item.price ? `$${item.price}` : '';
        
        const defaultMessage = `${orderType}訂購公版
備註：eddie推薦(不可刪)
姓名：
張數：
日期：${item.date}
${isTours ? '行程名稱' : '航空航點'}：${tourOrAirline}
金額：${priceText}
聯絡電話：
聯絡信箱：`;

        // 將訊息轉成網址安全格式
        const encodedMessage = encodeURIComponent(defaultMessage);
        
        // 使用 oaMessage API 讓客人跳轉過去時直接填寫到輸入框
        const lineOaUrl = `https://line.me/R/oaMessage/${LINE_OFFICIAL_ID}/?${encodedMessage}`;

        let btnText = '';
        if (isKKday) {
          btnText = isTours ? "前往 KKday 報名" : "前往 KKday 搶購";
        } else if (item.link) {
          btnText = isTours ? "前往指定網頁報名" : "前往指定網頁搶購";
        } else {
          btnText = isTours ? "聯繫合作旅行社 LINE 報名" : "聯繫合作旅行社 LINE 搶購";
        }

        // 判斷按鈕最終連結：如果有自訂連結(如KKday)就用自訂連結，否則使用帶有公版訊息的 LINE 連結
        const btnLink = item.link || lineOaUrl;
        
        const btnClass = isKKday 
          ? "bg-[#26C2CD] hover:bg-[#1db0ba] shadow-cyan-200/50" 
          : (item.link ? "bg-blue-600 hover:bg-blue-700 shadow-blue-200/50" : "bg-[#06C755] hover:bg-[#05b34c] shadow-green-200/50");
        const btnIcon = isKKday || item.link ? '<i class="ph-bold ph-arrow-square-out text-xl"></i>' : '<i class="ph-bold ph-chat-circle-dots text-xl"></i>';

        return `
          <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm ${index !== 0 ? 'mt-4' : ''}">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="inline-flex items-center gap-1 bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded-md mb-2">
                  ${subtitle}
                </span>
                <h4 class="text-lg font-black text-gray-900">${title}</h4>
              </div>
              ${item.price ? `
                <div class="text-right">
                  <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">優惠價</div>
                  <div class="text-xl font-black text-red-500">$${item.price}</div>
                </div>
              ` : ''}
            </div>
            
            <div class="bg-gray-50 p-4 rounded-xl text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${item.details}</div>
            
            <a href="${btnLink}" target="_blank" rel="noreferrer" class="mt-5 w-full text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm ${btnClass}">
              ${btnIcon} ${btnText}
            </a>
          </div>
        `;
      }).join('');

      modalRoot.innerHTML = `
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in">
          <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden zoom-in-95">
            <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
              <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                <i class="ph-bold ph-calendar-blank text-gray-400"></i> ${state.selectedDateTickets.date}
              </h3>
              <button onclick="closeModal()" class="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-full transition-colors flex items-center justify-center">
                <i class="ph-bold ph-x text-xl"></i>
              </button>
            </div>
            
            <div class="p-6 max-h-[60vh] overflow-y-auto space-y-6 bg-gray-50/50 no-scrollbar">
              ${contentHTML}
            </div>
          </div>
        </div>
      `;
    }

    function renderMain() {
      const mainEl = document.getElementById('main-content');
      if (state.isLoading) {
        mainEl.innerHTML = getLoadingHTML();
      } else if (!state.selectedCountryObj) {
        mainEl.innerHTML = getHomeHTML();
      } else if (state.selectedCountryObj.isTours) {
        mainEl.innerHTML = getToursHTML();
      } else {
        mainEl.innerHTML = getFlightsHTML();
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      fetchSheetData();
    });

  </script>
</body>
</html>
