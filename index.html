    function safeUpdateURL(url) { try { window.history.pushState({}, '', url); } catch (e) { console.warn('URL 更新被環境限制忽略:', e); } }

    function getCityFromText(text) {
      if (!text) return null;
      let earliestIndex = -1, foundCity = null;
      const checkMatch = (city, matchStr) => {
        let idx = text.indexOf(matchStr);
        if (idx !== -1 && (earliestIndex === -1 || idx < earliestIndex)) { earliestIndex = idx; foundCity = city; }
      };
      for (let mapping of CITY_ALIASES) { for (let alias of mapping.aliases) { checkMatch(mapping.standard, alias); } }
      for (let loc of LOCATION_DATA) { for (let tab of loc.tabs) { for (let c of tab.cities) { checkMatch(c, c); } } }
      if (!foundCity) {
        const normalizedText = text.toUpperCase().replace(/\s+/g, '');
        for (let mapping of FLIGHT_MAPPINGS) {
          for (let code of mapping.codes) {
            if (normalizedText.includes(code)) return mapping.city;
          }
        }
      }
      return foundCity;
    }

    function getCountryByCity(cityName) {
      if (!cityName) return '其他';
      const cleanCity = cityName.trim();
      for (let loc of LOCATION_DATA) { for (let tab of loc.tabs) { if (tab.cities.includes(cleanCity)) return loc.country; } }
      return '其他';
    }

    const normalizeForDedup = (str) => {
      if (!str) return '';
      try { return str.replace(/[\s\p{P}\p{Extended_Pictographic}❗️🔥✨⭐⚡️]/gu, '').replace(/更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊/g, '').toLowerCase(); }
      catch(e) { return str.replace(/[\s.,/#!$%^&*;:{}=\-_`~()[\]【】❗️🔥✨⭐⚡️]/g, '').replace(/更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊/g, '').toLowerCase(); }
    };

    function inferInfoFromText(text) {
      let title = '未命名行程', country = '其他', city = '其他航點';
      if (!text) return { title, country, city };
      const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
      let inferredCity = getCityFromText(text);
      if (inferredCity) { city = inferredCity; country = getCountryByCity(city); }
      else { for (let loc of LOCATION_DATA) { if (text.includes(loc.country)) { country = loc.country; break; } } }
      let bestTitle = '';
      for (let line of lines) {
        const fluffRegex = /^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉更新降價再降大降價清艙促銷最後機會預估最新快訊]+$/u;
        if (fluffRegex.test(line)) continue;
        const cleanLine = line.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()\-]+/gu, '').trim();
        if (cleanLine.length >= 2 && !cleanLine.startsWith('更新') && !cleanLine.startsWith('降價')) {
            bestTitle = cleanLine;
            break;
        }
      }
      if (bestTitle) {
          bestTitle = bestTitle.replace(/^(?:202[4-9][\/\-])?\d{1,2}[\/\-]\d{1,2}\s*/, '').trim();
          title = bestTitle;
      }
      return { title, country, city };
    }

    function inferAirlineFromCode(text) {
      if (!text) return '';
      const normalized = text.toUpperCase().replace(/\s+/g, '');
      const codes = {
        'IT': '台灣虎航', 'TR': '酷航', 'MM': '樂桃', 'JX': '星宇', 'BR': '長榮', 'CI': '華航',
        'VZ': '泰越捷', 'FD': '泰亞航', 'SL': '泰獅航', 'GK': '捷星', 'BX': '釜山航空',
        'TW': '德威', 'VJ': '越捷', '7C': '濟州航空', 'ZE': '易斯達', 'LJ': '真航空',
        'UO': '香港快運', 'HB': '大灣區', 'CX': '國泰', 'NX': '澳門航空', 'OD': '峇迪',
        'AK': '亞航', 'D7': '全亞航', 'MH': '馬航', 'SQ': '新航', 'PR': '菲律賓航空', '5J': '宿霧太平洋'
      };
      for (let code in codes) {
        const regex = new RegExp(code + '\\d{2,4}');
        if (regex.test(normalized)) return codes[code];
      }
      const names = ['酷航', '虎航', '台灣虎航', '星宇', '長榮', '華航', '中華航空', '越捷', '泰越捷', '樂桃', '捷星', '國泰', '釜山航空', '德威', '濟州航空', '真航空', '大灣區', '澳門航空', '亞航'];
      for (let name of names) {
        if (text.includes(name)) return name.replace('虎航', '台灣虎航').replace('台灣台灣虎航', '台灣虎航'); 
      }
      return '';
    }

    function getTicketStatus(dateStr, airline) {
      if (!dateStr) return { isHidden: false, isWarning: false };
      const parts = dateStr.split('-');
      if (parts.length !== 3) return { isHidden: false, isWarning: false };
      
      const depDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      depDate.setHours(0, 0, 0, 0);

      if (depDate <= today) return { isHidden: true, isWarning: false };

      let workingDaysLeft = 0;
      let cur = new Date(today);
      while (cur < depDate) {
          cur.setDate(cur.getDate() + 1);
          if (cur.getDay() !== 0 && cur.getDay() !== 6) {
              workingDaysLeft++;
          }
      }

      const isPeach = airline && (airline.includes('樂桃') || airline.toUpperCase().includes('MM'));
      const isScoot = airline && (airline.includes('酷航') || airline.toUpperCase().includes('TR'));

      let isHidden = false;
      let isWarning = false;

      if (isPeach) {
          if (workingDaysLeft <= 7) isHidden = true;
      } else if (isScoot) {
          if (workingDaysLeft < 2) {
              isHidden = true;
          } else if (workingDaysLeft === 2) {
              isWarning = true;
          }
      } else {
          if (workingDaysLeft < 4) {
              isHidden = true;
          } else if (workingDaysLeft === 4 || workingDaysLeft === 5) {
              isWarning = true;
          }
      }

      return { isHidden, isWarning };
    }

    function parseRawDetails(details, fallbackDate, fallbackPrice) {
      const isGlobalPak = details && (details.includes('機+酒') || details.includes('機加酒') || details.includes('機＋酒') || details.includes('自由行'));
      const isGlobalBogo = details && details.includes('買一送一');
      const isGlobalTour = details && (details.includes('行程 👉') || details.includes('行程：') || details.includes('團體') || details.includes('旅行團'));

      const normalizeDate = (d) => {
          if (!d) return null;
          let s = String(d).replace(/\//g, '-').trim();
          let p = s.split('-');
          if (p.length === 2) {
              const y = new Date().getFullYear();
              return `${y}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          }
          if (p.length === 3) return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
          return s;
      };
      
      let runningPrice = fallbackPrice ? String(fallbackPrice).replace(/[^\d]/g, '') : null;
      if (!details) return [{ date: normalizeDate(fallbackDate), price: runningPrice, isFlightAndHotel: isGlobalPak, isBogo: isGlobalBogo, isTour: isGlobalTour, cityContext: null, titleContext: null, link: null, blockText: '' }];
      
      const items = [];
      const currentYear = new Date().getFullYear();
      
      const extractDates = (text) => {
        if (!text) return [];
        const dates = [];
        let currentM = null, currentY = currentYear;
        const dateListRegex = /(?:^|[^\d])((?:\d{4}[\/\-])?\d{1,2}[\/\-]\d{1,2}(?!\s*[:月號])(?:[、，,\.\s\-]+(?:\d{1,2}[\/\-])?\d{1,2}(?!\s*[:月號]))*)/g;
        let match;
        while ((match = dateListRegex.exec(text)) !== null) {
            let safeStr = match[1].replace(/(\d{4})-(\d{1,2})-(\d{1,2})/g, '$1/$2/$3').replace(/(^|[^0-9\/])(\d{1,2})-(\d{1,2})(?=[^0-9\/]|$)/g, '$1$2/$3').replace(/\-/g, '、');
            const tokens = safeStr.split(/[、，,\.\s]+/);
            tokens.forEach(token => {
              if (!token) return;
              const parts = token.split('/');
              let y, m, d;
              if (parts.length === 3) { y = parseInt(parts[0], 10); m = parseInt(parts[1], 10); d = parseInt(parts[2], 10); currentY = y; currentM = m; }
              else if (parts.length === 2) { m = parseInt(parts[0], 10); d = parseInt(parts[1], 10); currentM = m; y = (currentM < 3) ? currentYear + 1 : currentYear; currentY = y; }
              else if (parts.length === 1 && currentM !== null) { d = parseInt(parts[0], 10); y = currentY; m = currentM; }
              else return;
              if (m >= 1 && m <= 12 && d >= 1 && d <= 31) dates.push(`${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
            });
        }
        return dates;
      };

      const priceRegexes = [
        /(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|促銷價|機票|含稅|未稅|TWD|NTD|只要)[:：\s\-\$＄]*([0-9,]{3,})/i,
        /([0-9]{1,2},[0-9]{3}|[1-9][0-9]{3,})[\s]*(?:起|元)/
      ];

      const blocks = details.split(/\n\s*[-=_]{3,}\s*\n?/);
      let footerText = '';
      
      if (blocks.length > 1) {
          const lastBlock = blocks[blocks.length - 1];
          if (extractDates(lastBlock).length === 0) {
              footerText = '\n\n' + lastBlock.trim();
          }
      }

      let currentCityContext = null;
      let currentTitleContext = null;

      for (let block of blocks) {
        if (!block.trim()) continue;
        if (block === blocks[blocks.length - 1] && extractDates(block).length === 0 && blocks.length > 1) continue; 

        let blockGlobalLinkMatch = block.match(/(https?:\/\/[^\s]+)/);
        let blockGlobalLink = blockGlobalLinkMatch ? blockGlobalLinkMatch[0] : null;

        const lines = block.split('\n');
        
        currentCityContext = null;
        currentTitleContext = null;
        let blockRunningPrice = runningPrice;

        for (let line of lines) {
            let pm = null;
            if (line.includes('→') || line.includes('->') || line.includes('=>')) {
                const parts = line.split(/→|->|=>/);
                pm = parts[parts.length - 1].match(/([0-9,]{4,})/);
            }
            if (!pm) { for (let rx of priceRegexes) { pm = line.match(rx); if (pm) break; } }
            if (pm) { blockRunningPrice = pm[1].replace(/,/g, ''); break; }
        }

        for (let i = 0; i < lines.length; i++) {
          let line = lines[i];
          let foundCityInLine = getCityFromText(line);
          if (foundCityInLine) {
              currentCityContext = foundCityInLine;
              let cleanLine = line.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '').replace(/^(更新|降價|再調|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();
              cleanLine = cleanLine.replace(/^(?:202[4-9][\/\-])?\d{1,2}[\/\-]\d{1,2}\s*/, '');
              if (cleanLine.length > 2) currentTitleContext = cleanLine;
          }
          let lineIsPak = (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) ? true : (line.includes('純機票') || line.includes('單機票')) ? false : isGlobalPak;
          
          let priceMatch = null;
          if (line.includes('→') || line.includes('->') || line.includes('=>')) {
              const parts = line.split(/→|->|=>/);
              priceMatch = parts[parts.length - 1].match(/([0-9,]{4,})/);
          }
          if (!priceMatch) {
              for (let rx of priceRegexes) { priceMatch = line.match(rx); if (priceMatch) break; }
          }
          if (priceMatch) blockRunningPrice = priceMatch[1].replace(/,/g, ''); 
          
          let urlMatch = line.match(/(https?:\/\/[^\s]+)/);
          let lineLink = urlMatch ? urlMatch[0] : null;

          let dates = extractDates(line);
          if (dates.length > 0) {
              let priceForTheseDates = blockRunningPrice;
              if (!priceMatch && i < lines.length - 1) {
                  const nextLine = lines[i+1];
                  let nextPriceMatch = null;
                  if (nextLine.includes('→') || nextLine.includes('->')) {
                      const parts = nextLine.split(/→|->/);
                      nextPriceMatch = parts[parts.length - 1].match(/([0-9,]{4,})/);
                  } else {
                      for (let rx of priceRegexes) { nextPriceMatch = nextLine.match(rx); if (nextPriceMatch) break; }
                  }
                  if (nextPriceMatch && extractDates(nextLine).length === 0) { 
                    priceForTheseDates = nextPriceMatch[1].replace(/,/g, ''); 
                    blockRunningPrice = priceForTheseDates; 
                  }
              }
              if (!priceForTheseDates) { 
                  for (let j = 0; j < lines.length; j++) { 
                      let pm = null;
                      if (lines[j].includes('→') || lines[j].includes('->')) {
                          const parts = lines[j].split(/→|->/);
                          pm = parts[parts.length - 1].match(/([0-9,]{4,})/);
                      } else {
                          for (let rx of priceRegexes) { pm = lines[j].match(rx); if (pm) break; }
                      }
                      if (pm) { priceForTheseDates = pm[1].replace(/,/g, ''); blockRunningPrice = priceForTheseDates; break; } 
                  } 
              }

              if (!currentTitleContext) {
                  let cleanLine = line.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '').replace(/^(更新|降價|再調|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();
                  cleanLine = cleanLine.replace(/^(?:202[4-9][\/\-])?\d{1,2}[\/\-]\d{1,2}\s*/, '');
                  if (cleanLine.length > 2) currentTitleContext = cleanLine;
              }

              for (let dateStr of dates) {
                  items.push({ 
                    date: dateStr, 
                    price: priceForTheseDates || '', 
                    isFlightAndHotel: lineIsPak, 
                    isBogo: isGlobalBogo || line.includes('買一送一'), 
                    isTour: isGlobalTour,
                    cityContext: currentCityContext, 
                    titleContext: currentTitleContext,
                    link: lineLink || blockGlobalLink,
                    blockText: block.trim() + footerText
                  });
              }
          }
        }
      }
      if (items.length > 0) return items;
      return [{ date: normalizeDate(fallbackDate), price: runningPrice || '', isFlightAndHotel: isGlobalPak, isBogo: isGlobalBogo, isTour: isGlobalTour, cityContext: currentCityContext, titleContext: currentTitleContext, link: null, blockText: details }];
    }

    async function fetchSheetData(force = false) {
      const CACHE_KEY_TICKETS = 'eddie_tickets_v11', CACHE_KEY_HOTELS = 'eddie_hotels_v11', CACHE_TIME = 'eddie_cache_time_v11', now = new Date().getTime();
      
      const cachedTickets = localStorage.getItem(CACHE_KEY_TICKETS);
      const cachedHotels = localStorage.getItem(CACHE_KEY_HOTELS);
      const cacheTime = localStorage.getItem(CACHE_TIME);

      let hasCache = false;
      if (cachedTickets && cachedHotels && !force) {
        state.tickets = JSON.parse(cachedTickets);
        state.hotels = JSON.parse(cachedHotels);
        state.isLoading = false;
        hasCache = true;
        renderMain(); 
        
        if (cacheTime && (now - parseInt(cacheTime)) < 60 * 1000) {
            return;
        }
      }

      if (!hasCache) {
          state.isLoading = true;
          renderMain();
      }

      try {
        const res = await fetch(`${API_URL}?cache=${now}`);
        const data = await res.json();
        const ticketMap = new Map(); 
        
        if (data && data.tickets) {
          let allTickets = data.tickets.flatMap((row, index) => {
            let rawText = row.details || row.city || row.country || ''; 
            if (typeof rawText !== 'string') rawText = String(rawText);
            if (rawText) rawText = rawText.replace(/台灣虎航/g, '🐯').replace(/虎航/g, '🐯');
            
            const inferred = inferInfoFromText(rawText);
            const parsedItems = parseRawDetails(rawText, row.date, row.price);
            
            return parsedItems.map((item, subIndex) => {
              let finalCity = item.cityContext || row.city || inferred.city;
              if (finalCity === '其他航點') finalCity = getCityFromText(inferred.title) || '其他航點';
              let finalCountry = getCountryByCity(finalCity);
              
              if (finalCity === '其他航點' || finalCountry === '其他') {
                  if (rawText.includes('泰國')) { finalCountry = '泰國'; finalCity = '曼谷'; }
                  else if (rawText.includes('韓國')) { finalCountry = '韓國'; finalCity = '首爾'; }
                  else if (rawText.includes('越南')) { finalCountry = '越南'; finalCity = '峴港'; }
              }
              if (!KNOWN_COUNTRIES.includes(finalCountry)) finalCountry = '其他';
              
              let airlineTag = item.isTour ? '跟團行程' : inferAirlineFromCode(rawText);
              let status = getTicketStatus(item.date, airlineTag || inferred.title);
              
              return { 
                id: `ticket-${index}-${subIndex}`, 
                country: finalCountry, 
                city: finalCity.trim(), 
                date: item.date, 
                airline: item.titleContext || inferred.title, 
                airlineTag: airlineTag, 
                price: item.price, 
                details: item.blockText || rawText, 
                link: item.link || row.link, 
                isFlightAndHotel: item.isFlightAndHotel, 
                isBogo: item.isBogo, 
                isTour: item.isTour,
                isHidden: status.isHidden,
                isWarning: status.isWarning
              };
            });
          }).filter(t => {
            if (!t.date) return false;
            if (t.isHidden) {
              console.log(`[自動下架] ${t.city} ${t.airline} (${t.date}) 已超過開票底線`);
              return false;
            }
            return true;
          }); 
          
          allTickets.forEach(t => { 
            const airlineKey = t.airlineTag || normalizeForDedup(t.airline).replace(/\d+/g, '');
            const key = `${t.date}_${t.city}_${airlineKey}_${t.isFlightAndHotel}_${t.isBogo}_${t.isTour}`;
            
            if (ticketMap.has(key)) {
              const existingPrice = parseInt((ticketMap.get(key).price || '').replace(/\D/g, '')) || 999999;
              const newPrice = parseInt((t.price || '').replace(/\D/g, '')) || 999999;
              if (newPrice < existingPrice) {
                ticketMap.set(key, t);
              }
            } else {
              ticketMap.set(key, t); 
            }
          }); 
        }
        
        if (data && data.tours) {
          let allTours = data.tours.flatMap((row, index) => {
            let rawText = row.details || row.title || row.country || '';
            if (typeof rawText !== 'string') rawText = String(rawText);
            const inferred = inferInfoFromText(rawText);
            const parsedItems = parseRawDetails(rawText, row.date, row.price);
            
            return parsedItems.map((item, subIndex) => {
              let finalCity = item.cityContext || inferred.city;
              if (finalCity === '其他航點') finalCity = getCityFromText(inferred.title) || '其他航點';
              let finalCountry = getCountryByCity(finalCity);
              
              if (finalCity === '其他航點' || finalCountry === '其他') {
                  if (rawText.includes('泰國')) { finalCountry = '泰國'; finalCity = '曼谷'; }
                  else if (rawText.includes('韓國')) { finalCountry = '韓國'; finalCity = '首爾'; }
                  else if (rawText.includes('越南')) { finalCountry = '越南'; finalCity = '峴港'; }
              }
              if (!KNOWN_COUNTRIES.includes(finalCountry)) finalCountry = '其他';
              
              let status = getTicketStatus(item.date, '跟團行程');

              return { 
                id: `tour-${index}-${subIndex}`, 
                country: finalCountry, 
                city: finalCity.trim(), 
                date: item.date, 
                airline: item.titleContext || inferred.title, 
                airlineTag: '跟團行程', 
                price: item.price, 
                details: item.blockText || rawText, 
                link: item.link || row.link,

                isBogo: item.isBogo, 
                isTour: true,
                isHidden: status.isHidden,
                isWarning: status.isWarning
              };
            });
          }).filter(t => {
            if (!t.date) return false;
            if (t.isHidden) {
              console.log(`[自動下架] 行程 ${t.city} ${t.airline} (${t.date}) 已超過底線`);
              return false;
            }
            return true;
          }); 
          
          allTours.forEach(t => { 
            const normTitle = normalizeForDedup(t.airline).replace(/\d+/g, '');
            const key = `${t.date}_${t.city}_跟團行程_${normTitle}_${t.price}`;
            if (ticketMap.has(key)) {
              const existingPrice = parseInt((ticketMap.get(key).price || '').replace(/\D/g, '')) || 999999;
              const newPrice = parseInt((t.price || '').replace(/\D/g, '')) || 999999;
              if (newPrice < existingPrice) ticketMap.set(key, t);
            } else {
              ticketMap.set(key, t); 
            }
          }); 
        }
        
        state.tickets = Array.from(ticketMap.values());

        localStorage.setItem(CACHE_KEY_TICKETS, JSON.stringify(state.tickets));

    function getFlightsHTML() {
      const year = state.currentDate.getFullYear(), month = state.currentDate.getMonth();
      const activeTabObj = state.selectedCountryObj.tabs.find(t => t.label === state.selectedTab);
      const allowedCities = activeTabObj ? activeTabObj.cities : [];
      const filteredTickets = state.tickets.filter(t => (state.selectedCountryObj.country === '其他' ? t.country === '其他' : t.country === state.selectedCountryObj.country && allowedCities.some(c => t.city.includes(c) || c.includes(t.city))));
      
      const pillsHTML = state.selectedCountryObj.tabs.map(tab => { 
        let displayCities = tab.cities.filter(c => c !== tab.label && c !== '北海道' && c !== '沖繩' && c !== '其他航點'); 
        if (displayCities.length === 0) displayCities = tab.cities; 
        const subText = displayCities.slice(0, 2).join(' · '); 
        const isSelected = state.selectedTab === tab.label; 
        return `<button onclick="selectTab('${tab.label}')" class="flex flex-col items-center justify-center px-4 py-2 rounded-2xl border transition-all ${isSelected ? 'bg-gray-900 text-white border-gray-900 shadow-md' : 'bg-white text-gray-700 border-gray-200 hover:bg-gray-50'}"><span class="text-sm font-bold whitespace-nowrap">${tab.label}</span><span class="text-[10px] mt-0.5 font-medium whitespace-nowrap ${isSelected ? 'text-gray-300' : 'text-gray-400'}">${subText}</span></button>`; 
      }).join('');
      
      const supportStationHTML = `
        <div class="mb-8 p-4 sm:p-5 bg-gradient-to-r from-blue-50 to-cyan-50 rounded-2xl border border-blue-100 flex flex-col md:flex-row items-center justify-between gap-4 fade-in">
          <div class="flex items-center gap-2.5 w-full md:w-auto">
            <div class="bg-blue-600 text-white p-1.5 rounded-lg"><i class="ph-bold ph-sparkle text-lg"></i></div>
            <div>
              <div class="font-black text-sm text-blue-900">${state.selectedCountryObj.country} 旅遊應援站</div>
              <div class="text-xs text-blue-700/80">出發前必備，為您備妥專屬優惠</div>
            </div>
          </div>
          <div class="flex flex-wrap gap-2 w-full md:w-auto">
            <a href="https://esimconnect.com.tw/#/access/esimbuy?referencecode=eddiewang" target="_blank" onclick="window.trackEvent('click_affiliate', {target: 'eSIM_Support_Banner'})" class="flex-1 md:flex-none flex items-center justify-center gap-1.5 bg-white hover:bg-blue-600 hover:text-white text-gray-700 px-4 py-2.5 rounded-xl text-xs font-bold border border-gray-200">eSIM 9折</a>
            <a href="https://www.kkday.com/zh-tw?cid=22649" target="_blank" onclick="window.trackEvent('click_affiliate', {target: 'KKday_Support_Banner'})" class="flex-1 md:flex-none flex items-center justify-center gap-1.5 bg-white hover:bg-[#26C2CD] hover:text-white text-gray-700 px-4 py-2.5 rounded-xl text-xs font-bold border border-gray-200">KKday 特惠</a>
          </div>
        </div>`;
      
      let contentHTML = '';
      
      if (state.viewMode === 'hotels') {
        const filteredHotels = state.hotels.filter(h => {
          const matchCountry = state.selectedCountryObj.country === '其他' ? h.country === '其他' : h.country === state.selectedCountryObj.country;
          const matchCity = allowedCities.some(c => h.city.includes(c) || c.includes(h.city));
          return matchCountry && matchCity;
        });
        if (filteredHotels.length === 0) {
          contentHTML = `<div class="py-20 text-center text-gray-500 bg-white rounded-3xl border border-gray-100 shadow-sm fade-in"><i class="ph-bold ph-buildings text-5xl text-gray-300 mb-4"></i><p class="font-bold text-gray-700 text-lg mb-2">這個地區目前還沒有社群推薦飯店唷！</p></div>`;
        } else {
          contentHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 fade-in">${filteredHotels.map(h => {
            const searchUrl = h.link || `https://www.google.com/search?q=${encodeURIComponent(h.country + ' ' + h.city + ' ' + h.name)}`;
            const submitterHtml = h.submitter ? `<div class="mt-4 flex items-center justify-end gap-1.5 text-[11px] font-bold text-gray-400"><i class="ph-fill ph-user-circle text-[14px]"></i> @${h.submitter} 熱心分享</div>` : '';
            return `
              <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-lg transition-all flex flex-col justify-between h-full group">
                <div>
                  <span class="inline-flex items-center gap-1 bg-blue-50 text-blue-600 text-[10px] font-bold px-2.5 py-1.5 rounded-lg mb-3"><i class="ph-bold ph-map-pin"></i> ${h.city}</span>
                  <h3 class="text-xl font-black text-gray-900 mb-4 leading-tight group-hover:text-blue-600 transition-colors">${h.name}</h3>
                  <div class="text-sm text-gray-600 bg-gray-50 p-4 rounded-xl mb-5 leading-relaxed relative"><i class="ph-fill ph-quotes text-gray-200 absolute top-2 right-2 text-3xl opacity-50"></i><span class="relative z-10 block pr-6 selectable-text">${h.description}</span></div>
                  ${submitterHtml}
                </div>
                <a href="${searchUrl}" target="_blank" onclick="window.trackEvent('click_outbound', {target: 'Hotel_Search', hotel_name: '${h.name}'})" class="w-full bg-gray-900 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2 transition-all text-sm shadow-sm">前往搜尋查看</a>
              </div>`;
          }).join('')}</div>`;
        }
      } else if (state.viewMode === 'list') {
         const todayStr = new Date().toISOString().split('T')[0];
         let upcoming = filteredTickets.filter(t => t.date >= todayStr);
         
         if (state.listSortBy === 'date') {
           upcoming.sort((a,b) => {
             if (a.date !== b.date) return a.date.localeCompare(b.date);
             return (parseInt((a.price||'').replace(/\D/g, '')) || 999999) - (parseInt((b.price||'').replace(/\D/g, '')) || 999999);
           });
         } else {
           upcoming.sort((a,b) => (parseInt((a.price||'').replace(/\D/g, '')) || 999999) - (parseInt((b.price||'').replace(/\D/g, '')) || 999999));
         }

         const sortUI = upcoming.length > 0 ? `<div class="flex items-center justify-end gap-2 mb-4 fade-in"><span class="text-sm font-bold text-gray-500">排序：</span><div class="bg-gray-100 p-1 rounded-lg flex text-xs font-bold"><button onclick="setListSortBy('price')" class="px-3 py-1.5 rounded-md transition-all ${state.listSortBy !== 'date' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}">最低金額</button><button onclick="setListSortBy('date')" class="px-3 py-1.5 rounded-md transition-all ${state.listSortBy === 'date' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}">出發日期</button></div></div>` : '';

         const listHTML = upcoming.map(t => {
           const encodedItem = encodeURIComponent(JSON.stringify(t)); 
           const isTour = t.isTour;
           const iconClass = isTour ? 'ph-flag-pennant' : 'ph-airplane-tilt';
           const tagClass = isTour ? 'text-orange-600 bg-orange-50 border-orange-100' : 'text-blue-600 bg-blue-50 border-blue-100';
           const airlineTagHtml = t.airlineTag ? `<div class="text-[10px] sm:text-xs font-bold ${tagClass} inline-block px-2 py-1 rounded-md border"><i class="ph-bold ${iconClass}"></i> ${t.airlineTag}</div>` : '';
           const warningTagHtml = t.isWarning ? `<div class="text-[10px] sm:text-xs font-bold text-red-600 bg-red-50 inline-block px-2 py-1 rounded-md border border-red-100"><i class="ph-fill ph-warning-circle"></i> 需確認機位</div>` : '';
           
           return `
             <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md cursor-pointer flex justify-between items-center ${t.isWarning ? 'ring-1 ring-red-400' : ''}" onclick="window.openModalFromItem('${encodedItem}')">
               <div>
                 <div class="text-xs font-bold text-gray-500 mb-1.5 flex items-center gap-1.5"><i class="ph-bold ph-calendar-blank text-gray-400"></i> ${t.date}</div>
                 <div class="font-black text-gray-900 text-lg line-clamp-1">${t.title || t.airline}</div>
                 <div class="flex flex-wrap items-center gap-1.5 mt-1.5">
                   <div class="text-[10px] sm:text-xs font-medium text-gray-600 bg-gray-50 inline-block px-2 py-1 rounded-md border border-gray-100">${t.city || t.country}${t.isFlightAndHotel ? ' · 機+酒' : ''}</div>
                   ${airlineTagHtml}
                   ${warningTagHtml}
                 </div>
               </div>
               <div class="text-right shrink-0 ml-4">
                 <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">優惠價</div>
                 <div class="text-xl font-black text-red-500">$${t.price || '--'}</div>
               </div>
             </div>`; 
         }).join('');
         
         contentHTML = upcoming.length === 0 ? `<div class="py-20 text-center text-gray-500 bg-white rounded-3xl border border-gray-100 shadow-sm"><i class="ph-bold ph-airplane-tilt text-4xl text-gray-300 mb-3"></i>目前暫無機票！</div>` : `${sortUI}<div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">${listHTML}</div>`;
      } else {
        const prefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        const monthTickets = filteredTickets.filter(t => t.date.startsWith(prefix));
        
        if (monthTickets.length === 0) {
          contentHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
              <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 bg-white">
                <button onclick="prevMonth()" class="p-2 hover:bg-gray-100 rounded-full"><i class="ph-bold ph-caret-left"></i></button>
                <h2 class="text-lg font-bold">${year}年 ${month + 1}月</h2>
                <button onclick="nextMonth()" class="p-2 hover:bg-gray-100 rounded-full"><i class="ph-bold ph-caret-right"></i></button>
              </div>
              <div class="py-24 text-center text-gray-500"><i class="ph-bold ph-calendar-x text-5xl text-gray-300 mb-4"></i><p class="font-bold text-gray-700 text-lg mb-2">這個月暫時沒有機票或行程唷！</p></div>
            </div>`;
        } else {
          let blanks = Array(new Date(year, month, 1).getDay()).fill(null);
          let days = Array.from({ length: new Date(year, month+1, 0).getDate() }, (_, i) => i + 1);
          contentHTML = `
            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
              <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 bg-white">
                <button onclick="prevMonth()" class="p-2 hover:bg-gray-100 rounded-full"><i class="ph-bold ph-caret-left"></i></button>
                <h2 class="text-lg font-bold">${year}年 ${month + 1}月</h2>
                <button onclick="nextMonth()" class="p-2 hover:bg-gray-100 rounded-full"><i class="ph-bold ph-caret-right"></i></button>
              </div>
              <div class="grid grid-cols-7 gap-px bg-gray-100 border-b border-gray-100">${['日', '一', '二', '三', '四', '五', '六'].map(d => `<div class="bg-white py-3 text-center text-xs font-bold text-gray-400">${d}</div>`).join('')}</div>
              <div class="grid grid-cols-7 gap-px bg-gray-100">
                ${blanks.map(() => `<div class="bg-white/50 min-h-[80px]"></div>`).join('')}
                ${days.map(d => { 
                  const dateStr = `${prefix}-${String(d).padStart(2, '0')}`;
                  const dayTickets = filteredTickets.filter(t => t.date === dateStr); 
                  return `
                    <div class="bg-white min-h-[80px] p-1 transition-all ${dayTickets.length ? 'cursor-pointer' : 'text-gray-400'}" ${dayTickets.length ? `onclick="openModal('${dateStr}')"` : ''}>
                      <div class="text-[10px] sm:text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full mb-1 ${dateStr === new Date().toISOString().split('T')[0] ? 'bg-gray-900 text-white' : 'text-gray-700'}">${d}</div>
                      <div class="flex flex-col gap-1">
                        ${dayTickets.map(t => {
                          const boxClass = t.isTour ? 'bg-orange-50 text-orange-700' : (t.isFlightAndHotel ? 'bg-purple-50 text-purple-700' : 'bg-blue-50 text-blue-700');
                          const extraLabel = t.isTour ? '<span class="text-[7px] leading-tight opacity-90 mt-[1px]">跟團行程</span>' : (t.isFlightAndHotel ? '<span class="text-[7px] leading-tight opacity-90 mt-[1px]">機加酒</span>' : '');
                          const warningIcon = t.isWarning ? '<span class="absolute -top-1 -right-1 flex h-2.5 w-2.5"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500 border border-white"></span></span>' : '';
                          return `
                          <div class="relative text-[9px] px-0.5 py-0.5 ${boxClass} rounded font-black text-center flex flex-col items-center ${t.isWarning ? 'ring-1 ring-red-400 shadow-sm' : ''}">
                            ${warningIcon}
                            <span class="whitespace-nowrap">${t.price || '有票'}</span>
                            ${extraLabel}
                          </div>
                        `}).join('')}
                      </div>
                    </div>`; 
                }).join('')}
              </div>
            </div>`;
        }
      }
      return `
        <div class="fade-in">
          ${supportStationHTML}
          <div class="flex items-center justify-between mb-6 flex-wrap">
            <div class="flex items-center gap-4">
              <button onclick="goHome()" class="p-2.5 bg-white border border-gray-200 rounded-full flex items-center justify-center shadow-sm"><i class="ph-bold ph-arrow-left text-xl"></i></button>
              <h1 class="text-2xl font-black">${state.selectedCountryObj.country} ${state.viewMode === 'hotels' ? '住宿推薦' : '機票與行程'}</h1>
            </div>
            <div class="flex items-center bg-gray-100 p-1 rounded-xl w-full sm:w-auto mt-4 sm:mt-0">
              <button onclick="setViewMode('calendar')" class="flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all ${state.viewMode==='calendar' ? 'bg-white shadow-sm text-gray-900':'text-gray-500'}">月曆</button>
              <button onclick="setViewMode('list')" class="flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all ${state.viewMode==='list' ? 'bg-white shadow-sm text-gray-900':'text-gray-500'}">列表</button>
              <button onclick="setViewMode('hotels')" class="flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all ${state.viewMode==='hotels' ? 'bg-white shadow-sm text-gray-900':'text-gray-500'}">找飯店</button>
            </div>
          </div>
          <div class="flex flex-wrap gap-2.5 mb-8">${pillsHTML}</div>
          ${contentHTML}
        </div>`;
    }

    function renderModal() {
      const modalRoot = document.getElementById('modal-root');
      if (!state.isModalOpen || !state.selectedDateTickets) { modalRoot.innerHTML = ''; return; }
      const contentHTML = state.selectedDateTickets.tickets.map((item, index) => {
        
        const templateTitle = item.isTour ? '跟團行程訂購公版' : '清艙機票訂購公版';
        const targetInfo = item.isTour ? ('行程名稱：' + item.airline) : ('航空航點：' + item.airline + ' ' + item.country + item.city);
        const countLabel = item.isTour ? '報名人數' : '張數';
        const lineOaUrl = `https://line.me/R/oaMessage/${LINE_OFFICIAL_ID}/?${encodeURIComponent(templateTitle + '\n備註：eddie推薦(不可刪)\n' + targetInfo + '\n日期：' + item.date + '\n金額：' + (item.price ? '$' + item.price : '') + '\n姓名：\n' + countLabel + '：\n聯絡電話：\n聯絡信箱：')}`;
        
        const extraLabels = (item.isTour ? ' · 跟團行程' : (item.isFlightAndHotel ? ' · 機+酒' : '')) + (item.isBogo ? ' · 買一送一' : '');
        
        const targetUrl = item.link || (item.details.match(/(https?:\/\/reurl\.cc\/[^\s]+|https?:\/\/[^\s]+|https?:\/\/heyzine\.com\/[^\s]+)/) ? item.details.match(/(https?:\/\/[^\s]+)/)[0] : null);
        
        const isTour = item.isTour;
        const iconClass = isTour ? 'ph-flag-pennant' : 'ph-airplane-tilt';
        const tagClass = isTour ? 'text-orange-600 bg-orange-50 border-orange-100' : 'text-blue-600 bg-blue-50 border-blue-100';
        const airlineTagHtml = item.airlineTag ? `<span class="inline-flex items-center gap-1 ${tagClass} text-xs font-bold px-2 py-1 rounded-md mb-2 border"><i class="ph-bold ${iconClass}"></i> ${item.airlineTag}</span>` : '';
        
        const warningBanner = item.isWarning ? `
          <div class="bg-red-50 border border-red-200 p-3.5 rounded-xl mb-4 flex items-start gap-2.5 text-red-700 shadow-sm">
            <i class="ph-fill ph-warning-circle text-xl shrink-0 mt-0.5"></i>
            <div>
              <strong class="text-sm font-black tracking-wide">即將結束開票！</strong>
              <p class="text-xs mt-1 font-medium leading-relaxed opacity-90">距離開票期限較近，請務必點擊下方按鈕，透過 LINE 向客服確認是否還有保留機位。</p>
            </div>
          </div>
        ` : '';

        return `
          <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm ${index !== 0 ? 'mt-4' : ''} ${item.isWarning ? 'ring-2 ring-red-400/50' : ''}">
            ${warningBanner}
            <div class="flex justify-between items-start mb-4">
              <div>
                <div class="flex flex-wrap items-center gap-1.5">
                  <span class="inline-flex items-center gap-1 bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded-md mb-2">${item.country} · ${item.city}${extraLabels}</span>
                  ${airlineTagHtml}
                </div>
                <h4 class="text-lg font-black text-gray-900">${item.airline}</h4>
              </div>
              ${item.price ? `<div class="text-right text-xl font-black text-red-500">$${item.price}</div>` : ''}
            </div>
            <div class="bg-gray-50 p-4 rounded-xl text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${item.details}</div>
            
            <div class="mt-3 flex items-start gap-1.5 text-[11px] text-gray-400 leading-tight">
              <i class="ph-bold ph-info text-xs mt-0.5 shrink-0"></i>
              <span>機位與名額依旅行社即時查詢為準，點擊下方按鈕後請儘速聯絡確認。</span>
            </div>

            <div class="mt-5 p-3.5 bg-gradient-to-r from-gray-900 to-gray-800 rounded-xl flex items-center justify-between shadow-md cursor-pointer hover:scale-[1.02] transition-transform border border-gray-700" onclick="window.open('https://esimconnect.com.tw/#/access/esimbuy?referencecode=eddiewang', '_blank'); window.trackEvent('click_affiliate', {target: 'eSIM_Modal'})">
              <div class="flex flex-col">
                <span class="text-yellow-400 text-[10px] font-bold mb-0.5 tracking-wider flex items-center gap-1">
                  <i class="ph-fill ph-lightbulb"></i> ${isTour ? '訂好行程了嗎？' : '訂好機票了嗎？'}
                </span>
                <span class="text-white text-sm font-black">領取艾迪王專屬 eSIM 優惠</span>
              </div>
              <div class="bg-white/20 p-1.5 rounded-lg text-white">
                <i class="ph-bold ph-caret-right"></i>
              </div>
            </div>

            ${(item.isTour && targetUrl) ? `<a href="${targetUrl}" target="_blank" rel="noreferrer" onclick="window.trackEvent('click_outbound', {target: 'Tour_Detail', url: '${targetUrl}'})" class="mt-3 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm"><i class="ph-bold ph-notebook text-xl"></i> 查看行程資訊</a>` : ''}
            
            <a href="${lineOaUrl}" target="_blank" rel="noreferrer" onclick="window.trackEvent('click_conversion', {target: 'LINE_Booking', type: '${isTour ? 'Tour' : 'Ticket'}'})" class="mt-3 w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm shadow-green-200/50"><i class="ph-bold ph-chat-circle-dots text-xl"></i> ${isTour ? '聯繫旅行社 LINE 報名' : '聯繫旅行社 LINE 搶購'}</a>
          </div>
        `;
      }).join('');
      modalRoot.innerHTML = `<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in" onclick="if(event.target===this) closeModal()"><div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden zoom-in-95 relative flex flex-col max-h-[85vh]"><div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between shrink-0"><h3 class="text-xl font-bold text-gray-900 flex items-center gap-2"><i class="ph-bold ph-calendar-blank text-gray-400"></i> ${state.selectedDateTickets.date}</h3><button onclick="closeModal()" class="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-full flex items-center justify-center"><i class="ph-bold ph-x text-xl"></i></button></div><div class="p-6 overflow-y-auto bg-gray-50/50 flex-1 no-scrollbar">${contentHTML}</div></div></div>`;
    }

    function renderMain() { 
      const el = document.getElementById('main-content'); 
      if (!state.selectedCountryObj && !state.searchQuery) el.innerHTML = getHomeHTML(); 
      else if (state.isLoading) el.innerHTML = getLoadingHTML(); 
      else if (state.searchQuery || state.selectedCountryObj?.isSearch) el.innerHTML = getSearchHTML(); 
      else if (state.selectedCountryObj?.isHotelsGlobal) el.innerHTML = getGlobalHotelsHTML(); 
      else el.innerHTML = getFlightsHTML(); 
    }

    window.addEventListener('DOMContentLoaded', () => {
      const p = new URLSearchParams(location.search), countrySlug = p.get('country'), tabSlug = p.get('tab'), q = p.get('q'), isHotels = p.get('hotels');
      if (q) { state.searchQuery = q; state.selectedCountryObj = { isSearch: true }; document.getElementById('searchInput').value = q; } 
      else if (isHotels) state.selectedCountryObj = { isHotelsGlobal: true };
      else if (countrySlug) { const countryObj = LOCATION_DATA.find(x => x.slug === countrySlug); if (countryObj) { state.selectedCountryObj = countryObj; const tabObj = countryObj.tabs.find(t => t.slug === tabSlug); state.selectedTab = tabObj ? tabObj.label : countryObj.tabs[0].label; } }
      fetchSheetData();
    });
  </script>
</body>
</html>
