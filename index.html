    function getCityFromText(text) {
      if (!text) return null;
      let earliestIndex = -1;
      let foundCity = null;

      const checkMatch = (city, matchStr) => {
        let idx = text.indexOf(matchStr);
        if (idx !== -1 && (earliestIndex === -1 || idx < earliestIndex)) {
          earliestIndex = idx;
          foundCity = city;
        }
      };

      for (let mapping of CITY_ALIASES) {
        for (let alias of mapping.aliases) {
          checkMatch(mapping.standard, alias);
        }
      }
      for (let loc of LOCATION_DATA) {
        for (let tab of loc.tabs) {
          for (let c of tab.cities) {
            checkMatch(c, c);
          }
        }
      }
      return foundCity;
    }

    function getCountryByCity(cityName) {
      for (let loc of LOCATION_DATA) {
        for (let tab of loc.tabs) {
          if (tab.cities.includes(cityName)) return loc.country;
        }
      }
      return '其他';
    }

    const normalizeForDedup = (str) => {
      if (!str) return '';
      try {
        return str.replace(/[\s\p{P}\p{Extended_Pictographic}❗️🔥✨⭐⚡️]/gu, '')
                  .replace(/更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊/g, '')
                  .toLowerCase();
      } catch(e) {
        return str.replace(/[\s.,/#!$%^&*;:{}=\-_`~()[\]【】❗️🔥✨⭐⚡️]/g, '')
                  .replace(/更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊/g, '')
                  .toLowerCase();
      }
    };

    // 智慧文字解析引擎
    function inferInfoFromText(text) {
      let title = '未命名行程';
      let country = '其他';
      let city = '其他航點';
      if (!text) return { title, country, city };
      const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
      let inferredCity = getCityFromText(text);
      if (inferredCity) {
        city = inferredCity;
        country = getCountryByCity(city);
      } else {
        for (let loc of LOCATION_DATA) {
          if (text.includes(loc.country)) {
            country = loc.country;
            break;
          }
        }
      }

      let bestTitle = '';
      let titleScore = -1;
      for (let line of lines) {
        const fluffRegex = /^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉更新降價再降大降價清艙促銷最後機會預估最新快訊]+$/u;

        let score = 0;
        let lineContainsCityRelated = false;
        if (city !== '其他航點' && line.includes(city)) {
          lineContainsCityRelated = true;
        }
        if (!lineContainsCityRelated && city !== '其他航點') {
          const mapping = CITY_ALIASES.find(m => m.standard === city);
          if (mapping) {
            for(let alias of mapping.aliases) {
               if(line.includes(alias)) { lineContainsCityRelated = true; break; }
            }
          }
        }
        if (lineContainsCityRelated) { score = 2; } 
        else if (country !== '其他' && line.includes(country)) { score = 1; }

        if (score > titleScore) {
          bestTitle = line;
          titleScore = score;
        }
      }

      if (bestTitle) {
        title = bestTitle.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '');
        title = title.replace(/^(更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();

        title = lines[0].replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '');
        title = title.replace(/^(更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();

      return { title, country, city };
    }

    function parseRawDetails(details, fallbackDate, fallbackPrice) {
      const isGlobalPak = details && (details.includes('機+酒') || details.includes('機加酒') || details.includes('機＋酒') || details.includes('自由行'));
      const isGlobalBogo = details && details.includes('買一送一');

      if (!details) return [{ date: fallbackDate, price: fallbackPrice, isFlightAndHotel: false, isBogo: false, cityContext: null, titleContext: null }];

      const lines = details.split('\n');
      const items = [];
      const currentYear = new Date().getFullYear();
      const currentMonth = new Date().getMonth() + 1;

      let isPakState = isGlobalPak;
      let currentCityContext = null;
      let currentTitleContext = null;
      let runningPrice = fallbackPrice ? String(fallbackPrice).replace(/,/g, '') : null;

      const extractDates = (text) => {
        if (!text) return [];
        const dates = [];
        let currentM = null;
        let currentY = currentYear;
        const dateListRegex = /(?:^|[^\d])((?:\d{4}[\/\-])?\d{1,2}[\/\-]\d{1,2}(?!\s*[:月號])(?:[、，,\.\s\-]+(?:\d{1,2}[\/\-])?\d{1,2}(?!\s*[:月號]))*)/g;
        let match;
        const matchList = [];
        while ((match = dateListRegex.exec(text)) !== null) { matchList.push(match[1]); }

        if (matchList.length > 0) {
          matchList.forEach(listStr => {
            let safeStr = listStr.replace(/(\d{4})-(\d{1,2})-(\d{1,2})/g, '$1/$2/$3');
            safeStr = safeStr.replace(/(^|[^0-9\/])(\d{1,2})-(\d{1,2})(?=[^0-9\/]|$)/g, '$1$2/$3');
            safeStr = safeStr.replace(/\-/g, '、');
            const tokens = safeStr.split(/[、，,\.\s]+/);
            tokens.forEach(token => {
              if (!token) return;
              const parts = token.split('/');
              let y, m, d;
              if (parts.length === 3) {
                y = parseInt(parts[0], 10); m = parseInt(parts[1], 10); d = parseInt(parts[2], 10);
                currentY = y; currentM = m;
              } else if (parts.length === 2) {
                m = parseInt(parts[0], 10); d = parseInt(parts[1], 10); currentM = m;
                y = (currentM < currentMonth - 2) ? currentYear + 1 : currentYear; currentY = y;
              } else if (parts.length === 1) {
                d = parseInt(parts[0], 10);
                if (currentM !== null) { y = currentY; m = currentM; } else { return; }
              } else { return; }
              if (m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                 dates.push(`${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
              }
            });
          });
        }
        return dates;
      };

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        let foundCityInLine = getCityFromText(line);
        if (foundCityInLine) {
            currentCityContext = foundCityInLine;
            let cleanLine = line.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '');
            cleanLine = cleanLine.replace(/^(更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();
            if (cleanLine.length > 2) currentTitleContext = cleanLine;
        }

        if (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) isPakState = true;
        else if (line.includes('純機票') || line.includes('單機票')) isPakState = false;

        const priceMatch = line.match(/(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|機票)[:：\s\-\$＄]*([0-9,]{3,})/i);
        if (priceMatch) runningPrice = priceMatch[1].replace(/,/g, ''); 

        let dates = extractDates(line);
        if (dates.length > 0) {
            let priceForTheseDates = runningPrice;
            if (!priceMatch && i < lines.length - 1) {
                const nextLine = lines[i+1];
                const nextPriceMatch = nextLine.match(/(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|機票)[:：\s\-\$＄]*([0-9,]{3,})/i);
                if (nextPriceMatch && extractDates(nextLine).length === 0) {
                    priceForTheseDates = nextPriceMatch[1].replace(/,/g, '');
                    runningPrice = priceForTheseDates; 
                }
            }
            if (!priceForTheseDates) {
                for (let j = 0; j < lines.length; j++) {
                    const pm = lines[j].match(/(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|機票)[:：\s\-\$＄]*([0-9,]{3,})/i);
                    if (pm) { priceForTheseDates = pm[1].replace(/,/g, ''); runningPrice = priceForTheseDates; break; }
                }
            }

            for (let dateStr of dates) {
                let lineIsPak = (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) ? true :
                                (line.includes('純機票') || line.includes('單機票')) ? false : isPakState;
                let lineIsBogo = isGlobalBogo || line.includes('買一送一');
                items.push({ 
                  date: dateStr, price: priceForTheseDates || '', isFlightAndHotel: lineIsPak, 
                  isBogo: lineIsBogo, cityContext: currentCityContext, titleContext: currentTitleContext
                });
            }
        }
      }

      if (items.length > 0) return items;
      return [{ date: fallbackDate, price: runningPrice || '', isFlightAndHotel: isGlobalPak, isBogo: isGlobalBogo, cityContext: currentCityContext, titleContext: currentTitleContext }];
    }

    // --- 資料串接與快取邏輯 ---
    async function fetchSheetData(force = false) {
      state.isLoading = true;
      renderMain();
      
      const CACHE_KEY_TICKETS = 'eddie_tickets_v1';
      const CACHE_KEY_TOURS = 'eddie_tours_v1';
      const CACHE_TIME = 'eddie_cache_time_v1';
      const now = new Date().getTime();
      
      if (!force) {
        const cachedTickets = sessionStorage.getItem(CACHE_KEY_TICKETS);
        const cachedTours = sessionStorage.getItem(CACHE_KEY_TOURS);
        const cacheTime = sessionStorage.getItem(CACHE_TIME);
        
        if (cachedTickets && cachedTours && cacheTime && (now - parseInt(cacheTime)) < 5 * 60 * 1000) {
           state.tickets = JSON.parse(cachedTickets);
           state.tours = JSON.parse(cachedTours);
           state.isLoading = false;
           renderMain();
           return;
        }
      }

      try {
        const res = await fetch(`${API_URL}?cache=${now}`);
        const data = await res.json();
        
        if (data && data.tickets) {
          let allTickets = data.tickets.flatMap((row, index) => {
            let rawText = row.details || '';
            if (rawText) rawText = rawText.replace(/台灣虎航/g, '🐯').replace(/虎航/g, '🐯');
            
            let globalCountry = row.country || ''; 
            let globalCity = row.city || '';
            let dateVal = row.date || ''; 
            let airline = row.airline || '';
            let priceVal = row.price || ''; 
            let link = row.link || '';

            // 修正 Webhook 資料判定邏輯：若 city 與 rawText 相同，代表是未處理的原始對話，必須清空讓智慧引擎接手
            if (globalCity === rawText || globalCountry === rawText) {
                globalCountry = ''; 
                globalCity = ''; 
                dateVal = ''; 
                airline = ''; 
                priceVal = '';
            }

            const inferred = inferInfoFromText(rawText);
            if (!globalCountry) globalCountry = inferred.country;
            if (!globalCity) globalCity = inferred.city;
            if (!airline) airline = inferred.title;

            const parsedItems = parseRawDetails(rawText, dateVal, priceVal);

            return parsedItems.map((item, subIndex) => {
              let finalCity = item.cityContext || globalCity;
              let finalCountry = globalCountry;
              
              if (item.cityContext) {
                finalCountry = getCountryByCity(item.cityContext) || globalCountry;
              }

              // 防護網：如果抓出來的國家不是已知的四大國，強制分類至「其他」以防消失
              if (!KNOWN_COUNTRIES.includes(finalCountry)) {
                finalCountry = '其他';
              }

              return {
                id: `ticket-${index}-${subIndex}`, country: finalCountry, city: finalCity,
                date: item.date, airline: item.titleContext || airline, price: item.price,
                details: rawText, link: link, isFlightAndHotel: item.isFlightAndHotel, isBogo: item.isBogo
              };
            });
          }).filter(t => t.date);

          const ticketMap = new Map();
          allTickets.forEach(ticket => {
            const normTitle = normalizeForDedup(ticket.airline);
            const key = `${ticket.date}_${ticket.city}_${normTitle}_${ticket.isFlightAndHotel}_${ticket.isBogo}`;
            ticketMap.set(key, ticket);
          });
          state.tickets = Array.from(ticketMap.values());
        }

        if (data && data.tours) {
            let allTours = data.tours.flatMap((row, index) => {
              let rawText = row.details || ''; 
              if (rawText) rawText = rawText.replace(/台灣虎航/g, '🐯').replace(/虎航/g, '🐯');

              let globalCountry = row.country || ''; 
              let title = row.title || '';
              let dateVal = row.date || ''; 
              let days = row.days || '';
              let priceVal = row.price || ''; 
              let link = row.link || '';

              // 修正 Webhook 資料判定邏輯
              if (globalCity === rawText || globalCountry === rawText || title === rawText) {
                globalCountry = ''; title = ''; dateVal = ''; days = ''; priceVal = '';
              }

              const inferred = inferInfoFromText(rawText);
              if (!globalCountry) globalCountry = inferred.country;
              if (!title) title = inferred.title;
              if (!days) { const daysMatch = rawText.match(/(\d+)[天日]/); if (daysMatch) days = daysMatch[0]; }

              const parsedItems = parseRawDetails(rawText, dateVal, priceVal);

              return parsedItems.map((item, subIndex) => {
                let finalCountry = globalCountry;
                if (item.cityContext) {
                  finalCountry = getCountryByCity(item.cityContext) || globalCountry;
                }
                
                // 防護網
                if (!KNOWN_COUNTRIES.includes(finalCountry)) {
                  finalCountry = '其他';
                }

                return {
                  id: `tour-${index}-${subIndex}`, country: finalCountry, title: item.titleContext || title,
                  date: item.date, days: days, price: item.price, details: rawText, link: link,
                  isFlightAndHotel: item.isFlightAndHotel, isBogo: item.isBogo
                };
              });
            }).filter(t => t.date);

            const tourMap = new Map();
            allTours.forEach(tour => {
              const normTitle = normalizeForDedup(tour.title);
              const key = `${tour.date}_${normTitle}_${tour.isFlightAndHotel}_${tour.isBogo}`;
              tourMap.set(key, tour);
            });
            state.tours = Array.from(tourMap.values());
        }
        
        sessionStorage.setItem(CACHE_KEY_TICKETS, JSON.stringify(state.tickets));
        sessionStorage.setItem(CACHE_KEY_TOURS, JSON.stringify(state.tours));
        sessionStorage.setItem(CACHE_TIME, now.toString());

      } catch (error) {
        console.error('讀取 API 錯誤:', error);
      } finally {
        state.isLoading = false;
        state.animateTransition = true;
        renderMain();
        state.animateTransition = false;
      }
    }

    window.forceRefresh = () => {

    };

      const q = query.trim().toLowerCase();
      state.searchQuery = q;
      if (q) {
         state.selectedCountryObj = { isSearch: true };
         safeUpdateURL(`?q=${encodeURIComponent(q)}`);
      } else {
         goHome();
      }
      state.animateTransition = true;
      renderMain();
      state.animateTransition = false;
    };

    window.goHome = () => {
      document.getElementById('searchInput').value = '';
      state.searchQuery = '';
      state.selectedCountryObj = null;
      state.selectedTab = null;
      state.currentDate = new Date();
      state.animateTransition = true;
      safeUpdateURL(window.location.pathname || '/');
      renderMain();
      state.animateTransition = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.selectCountry = (index) => {
      if (index === 'tours') {
        state.selectedCountryObj = { isTours: true };
        state.selectedTourCountry = '全部';
        safeUpdateURL(`?tours=true`);
      } else {
        state.selectedCountryObj = LOCATION_DATA[index];
        state.selectedTab = LOCATION_DATA[index].tabs[0].label;
        safeUpdateURL(`?country=${encodeURIComponent(LOCATION_DATA[index].country)}&tab=${encodeURIComponent(state.selectedTab)}`);
      }
      state.currentDate = new Date();
      state.animateTransition = true;
      renderMain();
      state.animateTransition = false;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.selectTab = (tabLabel) => {
      state.selectedTab = tabLabel;
      state.currentDate = new Date();
      state.animateTransition = false;
      const country = state.selectedCountryObj.country;
      safeUpdateURL(`?country=${encodeURIComponent(country)}&tab=${encodeURIComponent(tabLabel)}`);
      renderMain();
    };

    window.setViewMode = (mode) => {
      state.viewMode = mode;
      renderMain();
    };

    window.prevMonth = () => {
      state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() - 1, 1);
      state.animateTransition = false;
      renderMain();
    };

    window.nextMonth = () => {
      state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + 1, 1);
      state.animateTransition = false;
      renderMain();
    };

    window.openModalFromItem = (itemData) => {
      const item = JSON.parse(decodeURIComponent(itemData));
      state.selectedDateTickets = { date: item.date, tickets: [item], isTours: !!item.title };
      state.isModalOpen = true;
      renderModal();
    };

    window.openModal = (dateStr) => {
      if (state.selectedCountryObj.isTours) {
        const filteredTours = state.tours;
        const dayTours = filteredTours.filter(t => t.date === dateStr);
        if (dayTours.length > 0) {
          state.selectedDateTickets = { date: dateStr, tickets: dayTours, isTours: true };
          state.isModalOpen = true;
          renderModal();
        }
      } else {
        const activeTabObj = state.selectedCountryObj.tabs.find(t => t.label === state.selectedTab);
        const allowedCities = activeTabObj ? activeTabObj.cities : [];
        const dayTickets = state.tickets.filter(t => {
           if (state.selectedCountryObj.country === '其他') {
               return t.country === '其他' && t.date === dateStr;
           }
           return t.country === state.selectedCountryObj.country && allowedCities.includes(t.city) && t.date === dateStr;
        });

        if (dayTickets.length > 0) {
          state.selectedDateTickets = { date: dateStr, tickets: dayTickets, isTours: false };
          state.isModalOpen = true;
          renderModal();
        }
      }
    };

    window.closeModal = () => {
      state.isModalOpen = false;
      renderModal();
    };

            const encodedItem = encodeURIComponent(JSON.stringify(t));
            return `
            <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer flex justify-between items-center" onclick="window.openModalFromItem('${encodedItem}')">
                <div>
                    <div class="text-xs font-bold text-gray-500 mb-1.5 flex items-center gap-1.5"><i class="ph-bold ph-calendar-blank text-gray-400"></i> ${t.date}</div>
                    <div class="font-black text-gray-900 text-lg line-clamp-1">${t.title}</div>
                    <div class="text-xs font-medium text-gray-600 mt-1.5 bg-gray-50 inline-block px-2 py-1 rounded-md border border-gray-100">${t.country}${t.days ? ' · ' + t.days : ''}${extra}${bogo}</div>
                </div>
                <div class="text-right shrink-0 ml-4">
                    <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">優惠價</div>
                    <div class="text-xl font-black text-red-500">$${t.price || '--'}</div>
                </div>
            </div>
            `;
          }).join('');
      }

      return `
        <div class="${state.animateTransition ? 'slide-in-from-right-8' : ''}">
          <div class="flex items-center gap-4 mb-8">
            <button onclick="goHome()" class="p-2.5 bg-white border border-gray-200 rounded-full text-gray-600 hover:bg-gray-50 transition-colors shadow-sm flex items-center justify-center">
              <i class="ph-bold ph-arrow-left text-xl"></i>
            </button>
            <div>
              <h1 class="text-2xl font-bold text-gray-900">精選優惠旅行團</h1>
              <p class="text-sm text-gray-500 mt-1">為您挑選最高 CP 值的套裝行程，輕鬆出遊沒煩惱</p>
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${listHTML}
          </div>
        </div>
      `;
    }

    function getFlightsHTML() {
      const year = state.currentDate.getFullYear();
      const month = state.currentDate.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = new Date(year, month, 1).getDay();

      const activeTabObj = state.selectedCountryObj.tabs.find(t => t.label === state.selectedTab);
      const allowedCities = activeTabObj ? activeTabObj.cities : [];
      
      const filteredTickets = state.tickets.filter(t => {
         if (state.selectedCountryObj.country === '其他') {
             return t.country === '其他';
         }
         return t.country === state.selectedCountryObj.country && allowedCities.includes(t.city);
      });

      const pillsHTML = state.selectedCountryObj.tabs.map(tab => {
        let displayCities = tab.cities.filter(c => c !== tab.label && c !== '北海道' && c !== '沖繩' && c !== '其他航點');
        if (displayCities.length === 0) displayCities = tab.cities; 
        const subText = displayCities.slice(0, 2).join(' · ');
        const isSelected = state.selectedTab === tab.label;

        return `
        <button
          onclick="selectTab('${tab.label}')"
          class="flex flex-col items-center justify-center px-4 py-2 rounded-2xl transition-all duration-200 border ${isSelected ? 'bg-gray-900 text-white border-gray-900 shadow-md' : 'bg-white text-gray-700 border-gray-200 hover:border-gray-300 hover:bg-gray-50'}"
        >
          <span class="text-sm font-bold whitespace-nowrap">${tab.label}</span>
          <span class="text-[10px] mt-0.5 font-medium tracking-wide whitespace-nowrap ${isSelected ? 'text-gray-300' : 'text-gray-400'}">${subText}</span>
        </button>
      `}).join('');

      let contentHTML = '';

      if (state.viewMode === 'list') {
         const todayStr = new Date().toISOString().split('T')[0];
         const upcoming = filteredTickets.filter(t => t.date >= todayStr).sort((a,b) => {
            let pa = parseInt((a.price||'').replace(/\D/g, '')) || 999999;
            let pb = parseInt((b.price||'').replace(/\D/g, '')) || 999999;
            return pa - pb;
         });

         if (upcoming.length === 0) {
            contentHTML = `<div class="py-20 text-center text-gray-500 font-medium flex flex-col items-center bg-white rounded-3xl shadow-sm border border-gray-100 fade-in"><i class="ph-bold ph-airplane-tilt text-4xl text-gray-300 mb-3"></i>目前此區域未來暫無機票，換個地方看看吧！</div>`;
         } else {
            contentHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">` + upcoming.map(t => {
                const isPak = t.isFlightAndHotel;
                const extra = isPak ? ' · 機+酒' : '';
                const bogo = t.isBogo ? ' · 買一送一' : '';
                const encodedItem = encodeURIComponent(JSON.stringify(t));
                return `
                <div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer flex justify-between items-center" onclick="window.openModalFromItem('${encodedItem}')">
                    <div>
                        <div class="text-xs font-bold text-gray-500 mb-1.5 flex items-center gap-1.5"><i class="ph-bold ph-calendar-blank text-gray-400"></i> ${t.date}</div>
                        <div class="font-black text-gray-900 text-lg line-clamp-1">${t.airline}</div>
                        <div class="text-xs font-medium text-gray-600 mt-1.5 bg-gray-50 inline-block px-2 py-1 rounded-md border border-gray-100">${t.city}${extra}${bogo}</div>
                    </div>
                    <div class="text-right shrink-0 ml-4">
                        <div class="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-0.5">優惠價</div>
                        <div class="text-xl font-black text-red-500">$${t.price || '--'}</div>
                    </div>
                </div>
                `;
            }).join('') + `</div>`;
         }
      } else {
        const currentMonthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        const monthHasTickets = filteredTickets.some(t => t.date.startsWith(currentMonthPrefix));

        let daysHTML = '';
        if (!monthHasTickets) {
            // 已移除飛機圖示
            daysHTML = `
              <div class="col-span-7 py-24 text-center text-gray-500 flex flex-col items-center fade-in">
                <i class="ph-bold ph-calendar-x text-5xl text-gray-300 mb-4"></i>
                <p class="font-bold text-gray-700 text-lg mb-2">這個月暫時沒有清艙機票唷！</p>
                <p class="text-sm">您可以點擊上方箭頭看看下個月，或切換成「列表模式」查看所有未來機票</p>
              </div>
            `;
        } else {
            let blanksHTML = '';
            for (let i = 0; i < firstDay; i++) {
              blanksHTML += `<div class="bg-white/50 min-h-[80px] sm:min-h-[100px] p-0.5 sm:p-2"></div>`;
            }
            daysHTML += blanksHTML;

            const todayStr = new Date().toISOString().split('T')[0];
            for (let d = 1; d <= daysInMonth; d++) {
              const dateStr = `${currentMonthPrefix}-${String(d).padStart(2, '0')}`;
              const dayTickets = filteredTickets.filter(t => t.date === dateStr);
              const hasTickets = dayTickets.length > 0;
              const isToday = todayStr === dateStr;

              let ticketsHTML = dayTickets.map(ticket => {
                const isPak = ticket.isFlightAndHotel;
                const bgClass = isPak ? 'bg-purple-50' : 'bg-blue-50';
                const textClass = isPak ? 'text-purple-700' : 'text-blue-700';
                const borderClass = isPak ? 'border-purple-100/50' : 'border-blue-100/50';
                
                const extraTexts = [];
                if (isPak) extraTexts.push('(機+酒)');
                if (ticket.isBogo) extraTexts.push('(買一送一)');
                const extraTextHTML = extraTexts.length > 0 ? `<div class="text-[7px] sm:text-[9px] mt-0.5 font-medium tracking-tighter opacity-90 whitespace-nowrap transform scale-90 sm:scale-100 origin-top">${extraTexts.join('')}</div>` : '';
                
                return `
                  <div class="text-[9px] sm:text-[12px] px-0 sm:px-1 py-1 ${bgClass} ${textClass} rounded sm:rounded-md font-bold tracking-tighter border ${borderClass} shadow-sm text-center leading-none flex flex-col items-center justify-center overflow-hidden w-full">
                    <span class="whitespace-nowrap font-black">${ticket.price ? ticket.price : '有票'}</span>
                    ${extraTextHTML}
                  </div>
                `;
              }).join('');

              daysHTML += `
                <div class="bg-white min-h-[80px] sm:min-h-[110px] p-0.5 sm:p-2 transition-all relative group ${hasTickets ? 'cursor-pointer hover:bg-blue-50/50' : 'text-gray-400'}" ${hasTickets ? `onclick="openModal('${dateStr}')"` : ''}>
                  <div class="text-[10px] sm:text-sm font-semibold inline-flex items-center justify-center w-5 h-5 sm:w-7 sm:h-7 rounded-full mb-0.5 ${isToday ? 'bg-gray-900 text-white' : 'text-gray-700'}">${d}</div>
                  <div class="flex flex-col gap-1 sm:gap-1.5 w-full">${ticketsHTML}</div>
                </div>
              `;
            }
        }

        contentHTML = `
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden fade-in">
            <div class="flex items-center justify-between px-4 sm:px-6 py-5 border-b border-gray-100 bg-white">
              <button onclick="prevMonth()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600 flex items-center justify-center"><i class="ph-bold ph-caret-left text-xl"></i></button>
              <h2 class="text-base sm:text-lg font-bold text-gray-800 tracking-wider">${year}年 ${month + 1}月</h2>
              <button onclick="nextMonth()" class="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-600 flex items-center justify-center"><i class="ph-bold ph-caret-right text-xl"></i></button>
            </div>
            ${monthHasTickets ? `
            <div class="grid grid-cols-7 gap-px bg-gray-100 border-b border-gray-100">
              ${['日', '一', '二', '三', '四', '五', '六'].map(day => `<div class="bg-white py-2 sm:py-3 text-center text-[10px] sm:text-xs font-bold text-gray-400">${day}</div>`).join('')}
            </div>` : ''}
            <div class="grid grid-cols-7 gap-px bg-gray-100">
              ${daysHTML}
            </div>
          </div>
        `;
      }

      return `
        <div class="${state.animateTransition ? 'slide-in-from-right-8' : ''}">
          <div class="flex items-center justify-between gap-4 mb-8 flex-wrap">
            <div class="flex items-center gap-4">
              <button onclick="goHome()" class="p-2.5 bg-white border border-gray-200 rounded-full text-gray-600 hover:bg-gray-50 transition-colors shadow-sm flex items-center justify-center">
                <i class="ph-bold ph-arrow-left text-xl"></i>
              </button>
              <div>
                <h1 class="text-xl sm:text-2xl font-bold text-gray-900">${state.selectedCountryObj.country} 清艙機票</h1>
              </div>
            </div>

            <!-- 切換檢視模式按鈕 -->
            <div class="flex items-center bg-gray-100 p-1 rounded-xl w-full sm:w-auto mt-2 sm:mt-0">
               <button onclick="setViewMode('calendar')" class="flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${state.viewMode==='calendar' ? 'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}"><i class="ph-bold ph-calendar-blank text-lg"></i> 月曆</button>
               <button onclick="setViewMode('list')" class="flex-1 sm:flex-none px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${state.viewMode==='list' ? 'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}"><i class="ph-bold ph-list-dashes text-lg"></i> 列表</button>
            </div>
          </div>

          <div class="flex flex-wrap gap-2.5 mb-8">
            ${pillsHTML}
          </div>

          ${contentHTML}
        </div>
      `;
    }

    function renderModal() {
      const modalRoot = document.getElementById('modal-root');
      if (!state.isModalOpen || !state.selectedDateTickets) {
        modalRoot.innerHTML = '';
        return;
      }

      const isTours = state.selectedDateTickets.isTours;

      const contentHTML = state.selectedDateTickets.tickets.map((item, index) => {
        const title = isTours ? item.title : item.airline;
        const extraLabelPak = item.isFlightAndHotel ? ' · 機+酒' : '';
        const extraLabelBogo = item.isBogo ? ' · 買一送一' : '';
        
        const subtitle = isTours 
          ? `<i class="ph-bold ph-map-pin"></i> ${item.country} ${item.days ? '· ' + item.days : ''}${extraLabelPak}${extraLabelBogo}` 
          : `${item.country} · ${item.city}${extraLabelPak}${extraLabelBogo}`;
        
        const isKKday = (title && title.toLowerCase().includes('kkday')) || (item.link && item.link.toLowerCase().includes('kkday'));
        
        let orderType = isTours ? '優惠旅行團' : '清艙機票';
        if (item.isFlightAndHotel) {
          orderType = '機+酒';
        }

        const tourOrAirline = isTours ? item.title : `${item.airline} ${item.country}${item.city}`;
        const priceText = item.price ? `$${item.price}${item.isBogo ? ' (買一送一)' : ''}` : '';
        
        const defaultMessage = `${orderType}訂購公版
備註：eddie推薦(不可刪)
${isTours ? '行程名稱' : '航空航點'}：${tourOrAirline}
日期：${item.date}
金額：${priceText}
姓名：
張數：
聯絡電話：
聯絡信箱：`;

        const encodedMessage = encodeURIComponent(defaultMessage);
        const lineOaUrl = `https://line.me/R/oaMessage/${LINE_OFFICIAL_ID}/?${encodedMessage}`;

        let btnText = isKKday ? "前往 KKday 搶購" : (item.link ? "前往指定網頁搶購" : "聯繫合作旅行社 LINE 搶購");
        const btnLink = item.link || lineOaUrl;
        
        const btnClass = isKKday 
          ? "bg-[#26C2CD] hover:bg-[#1db0ba] shadow-cyan-200/50" 
          : (item.link ? "bg-blue-600 hover:bg-blue-700 shadow-blue-200/50" : "bg-[#06C755] hover:bg-[#05b34c] shadow-green-200/50");
        const btnIcon = isKKday || item.link ? '<i class="ph-bold ph-arrow-square-out text-xl"></i>' : '<i class="ph-bold ph-chat-circle-dots text-xl"></i>';

        return `
          <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm ${index !== 0 ? 'mt-4' : ''}">
            <div class="flex justify-between items-start mb-4">
              <div>
                <span class="inline-flex items-center gap-1 bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded-md mb-2">
                  ${subtitle}
                </span>
                <h4 class="text-lg font-black text-gray-900">${title}</h4>
              </div>
              ${item.price ? `
                <div class="text-right">
                  <div class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">優惠價</div>
                  <div class="text-xl font-black text-red-500">$${item.price}</div>
                </div>
              ` : ''}
            </div>
            
            <div class="bg-gray-50 p-4 rounded-xl text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${item.details}</div>
            
            <a href="${btnLink}" target="_blank" rel="noreferrer" class="mt-5 w-full text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm ${btnClass}">
              ${btnIcon} ${btnText}
            </a>
          </div>
        `;
      }).join('');

      modalRoot.innerHTML = `
        <div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in" onclick="if(event.target===this) closeModal()">
          <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden zoom-in-95 relative flex flex-col max-h-[85vh]">
            <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between shrink-0">
              <h3 class="text-xl font-bold text-gray-900 flex items-center gap-2">
                <i class="ph-bold ph-calendar-blank text-gray-400"></i> ${state.selectedDateTickets.date}
              </h3>
              <button onclick="closeModal()" class="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-full transition-colors flex items-center justify-center">
                <i class="ph-bold ph-x text-xl"></i>
              </button>
            </div>
            <div class="p-6 overflow-y-auto bg-gray-50/50 flex-1">
              ${contentHTML}
            </div>
          </div>
        </div>
      `;
    }

    function renderMain() {
      const mainEl = document.getElementById('main-content');
      if (state.isLoading) {
        mainEl.innerHTML = getLoadingHTML();
      } else if (state.searchQuery || state.selectedCountryObj?.isSearch) {
        mainEl.innerHTML = getSearchHTML();
      } else if (!state.selectedCountryObj) {
        mainEl.innerHTML = getHomeHTML();
      } else if (state.selectedCountryObj.isTours) {
        mainEl.innerHTML = getToursHTML();
      } else {
        mainEl.innerHTML = getFlightsHTML();
      }
    }

    // --- 啟動邏輯 (結合深層網址解析) ---
    window.addEventListener('DOMContentLoaded', () => {
      // 解析網址參數
      const urlParams = new URLSearchParams(window.location.search);
      const countryParam = urlParams.get('country');
      const tabParam = urlParams.get('tab');
      const toursParam = urlParams.get('tours');
      const qParam = urlParams.get('q');

      if (qParam) {
        state.searchQuery = qParam;
        state.selectedCountryObj = { isSearch: true };
        document.getElementById('searchInput').value = qParam;
      } else if (toursParam) {
        state.selectedCountryObj = { isTours: true };
      } else if (countryParam) {
        const cIdx = LOCATION_DATA.findIndex(c => c.country === countryParam);
        if (cIdx !== -1) {
          state.selectedCountryObj = LOCATION_DATA[cIdx];
          state.selectedTab = tabParam || LOCATION_DATA[cIdx].tabs[0].label;
        }
      }
      
      fetchSheetData();
    });

  </script>
</body>
</html>
