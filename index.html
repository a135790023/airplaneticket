      if (!foundCity) {
        const normalizedText = text.toUpperCase().replace(/\s+/g, '');
        for (let mapping of FLIGHT_MAPPINGS) {
          for (let code of mapping.codes) {
            if (normalizedText.includes(code)) return mapping.city;
          }
        }
      }
      return foundCity;
    }

    function getCountryByCity(cityName) {
      if (!cityName) return '其他';
      const cleanCity = cityName.trim();
      for (let loc of LOCATION_DATA) { for (let tab of loc.tabs) { if (tab.cities.includes(cleanCity)) return loc.country; } }
      return '其他';
    }

    const normalizeForDedup = (str) => {
      if (!str) return '';
      try { return str.replace(/[\s\p{P}\p{Extended_Pictographic}❗️🔥✨⭐⚡️]/gu, '').replace(/更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊/g, '').toLowerCase(); }
      catch(e) { return str.replace(/[\s.,/#!$%^&*;:{}=\-_`~()[\]【】❗️🔥✨⭐⚡️]/g, '').replace(/更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊/g, '').toLowerCase(); }
    };

    function inferInfoFromText(text) {
      let title = '未命名行程', country = '其他', city = '其他航點';
      if (!text) return { title, country, city };
      const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
      let inferredCity = getCityFromText(text);
      if (inferredCity) { city = inferredCity; country = getCountryByCity(city); }
      else { for (let loc of LOCATION_DATA) { if (text.includes(loc.country)) { country = loc.country; break; } } }
      let bestTitle = '', titleScore = -1;
      for (let line of lines) {
        const fluffRegex = /^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉更新降價再降大降價清艙促銷最後機會預估最新快訊]+$/u;
        if (fluffRegex.test(line)) continue;
        let score = 0, lineContainsCityRelated = false;
        if (city !== '其他航點' && line.includes(city)) score = 2; else if (country !== '其他' && line.includes(country)) score = 1;
        if (score > titleScore) { bestTitle = line; titleScore = score; }
      }
      if (bestTitle) title = bestTitle.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '').replace(/^(更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();
      return { title, country, city };
    }

    function parseRawDetails(details, fallbackDate, fallbackPrice) {
      const isGlobalPak = details && (details.includes('機+酒') || details.includes('機加酒') || details.includes('機＋酒') || details.includes('自由行'));
      const isGlobalBogo = details && details.includes('買一送一');
      const normalizeDate = (d) => {
          if (!d) return null;
          let s = String(d).replace(/\//g, '-').trim();
          let p = s.split('-');
          if (p.length === 2) {
              const y = new Date().getFullYear();
              return `${y}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
          }
          if (p.length === 3) return `${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`;
          return s;
      };
      if (!details) return [{ date: normalizeDate(fallbackDate), price: fallbackPrice, isFlightAndHotel: false, isBogo: false, cityContext: null, titleContext: null }];
      const lines = details.split('\n'), items = [];
      const currentYear = new Date().getFullYear();
      let isPakState = isGlobalPak, currentCityContext = null, currentTitleContext = null, runningPrice = fallbackPrice ? String(fallbackPrice).replace(/[^\d]/g, '') : null;
      const extractDates = (text) => {
        if (!text) return [];
        const dates = [];
        let currentM = null, currentY = currentYear;
        const dateListRegex = /(?:^|[^\d])((?:\d{4}[\/\-])?\d{1,2}[\/\-]\d{1,2}(?!\s*[:月號])(?:[、，,\.\s\-]+(?:\d{1,2}[\/\-])?\d{1,2}(?!\s*[:月號]))*)/g;
        let match;
        while ((match = dateListRegex.exec(text)) !== null) {
            let safeStr = match[1].replace(/(\d{4})-(\d{1,2})-(\d{1,2})/g, '$1/$2/$3').replace(/(^|[^0-9\/])(\d{1,2})-(\d{1,2})(?=[^0-9\/]|$)/g, '$1$2/$3').replace(/\-/g, '、');
            const tokens = safeStr.split(/[、，,\.\s]+/);
            tokens.forEach(token => {
              if (!token) return;
              const parts = token.split('/');
              let y, m, d;
              if (parts.length === 3) { y = parseInt(parts[0], 10); m = parseInt(parts[1], 10); d = parseInt(parts[2], 10); currentY = y; currentM = m; }
              else if (parts.length === 2) { m = parseInt(parts[0], 10); d = parseInt(parts[1], 10); currentM = m; y = (currentM < 3) ? currentYear + 1 : currentYear; currentY = y; }
              else if (parts.length === 1 && currentM !== null) { d = parseInt(parts[0], 10); y = currentY; m = currentM; }
              else return;
              if (m >= 1 && m <= 12 && d >= 1 && d <= 31) dates.push(`${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
            });
        }
        return dates;
      };
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        let foundCityInLine = getCityFromText(line);
        if (foundCityInLine) {
            currentCityContext = foundCityInLine;
            let cleanLine = line.replace(/^[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️👉【】\[\]()]+|[\p{Extended_Pictographic}\s❗️🔥✨⭐⚡️]+$/gu, '').replace(/^(更新|降價|再調|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '').trim();
            if (cleanLine.length > 2) currentTitleContext = cleanLine;
        }
        if (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) isPakState = true;
        else if (line.includes('純機票') || line.includes('單機票')) isPakState = false;
        
        const priceRegexes = [
          /(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|促銷價|機票|含稅|未稅|TWD|NTD|只要)[:：\s\-\$＄]*([0-9,]{3,})/i,
          /([0-9]{1,2},[0-9]{3}|[1-9][0-9]{3,})[\s]*(?:起|元)/
        ];
        let priceMatch = null;
        for (let rx of priceRegexes) { priceMatch = line.match(rx); if (priceMatch) break; }
        if (priceMatch) runningPrice = priceMatch[1].replace(/,/g, ''); 
        
        let dates = extractDates(line);
        if (dates.length > 0) {
            let priceForTheseDates = runningPrice;
            if (!priceMatch && i < lines.length - 1) {
                const nextLine = lines[i+1];
                let nextPriceMatch = null;
                for (let rx of priceRegexes) { nextPriceMatch = nextLine.match(rx); if (nextPriceMatch) break; }
                if (nextPriceMatch && extractDates(nextLine).length === 0) { priceForTheseDates = nextPriceMatch[1].replace(/,/g, ''); runningPrice = priceForTheseDates; }
            }
            if (!priceForTheseDates) { 
                for (let j = 0; j < lines.length; j++) { 
                    let pm = null;
                    for (let rx of priceRegexes) { pm = lines[j].match(rx); if (pm) break; }
                    if (pm) { priceForTheseDates = pm[1].replace(/,/g, ''); runningPrice = priceForTheseDates; break; } 
                } 
            }
            for (let dateStr of dates) {
                let lineIsPak = (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) ? true : (line.includes('純機票') || line.includes('單機票')) ? false : isPakState;
                let lineIsBogo = isGlobalBogo || line.includes('買一送一');
                items.push({ date: dateStr, price: priceForTheseDates || '', isFlightAndHotel: lineIsPak, isBogo: lineIsBogo, cityContext: currentCityContext, titleContext: currentTitleContext });
            }
        }
      }
      if (items.length > 0) return items;
      return [{ date: normalizeDate(fallbackDate), price: runningPrice || '', isFlightAndHotel: isGlobalPak, isBogo: isGlobalBogo, cityContext: currentCityContext, titleContext: currentTitleContext }];
    }

    // 新增：航空公司精準萃取引擎，無視其他冗詞贅字
    function extractAirline(text) {
      if (!text) return '未知航空';
      const airlines = ['酷航', '虎航', '星宇', '長榮', '華航', '中華', '越捷', '越竹', '亞洲', '亞航', 'AirAsia', '樂桃', '捷星', '國泰', '泰越捷', '獅航', '泰獅', '泰航', '大韓', '韓亞', '真航空', '德威', '濟州', '釜山', '首爾', '易斯達', '吉祥', '馬航', '新航', '星悅', '大灣區', '香港', '澳門', '阿聯酋', '聯合', '日航', '全日空', 'ANA', 'JAL', '峇迪'];
      for (let a of airlines) {
         if (text.includes(a)) return a;
      }
      return '未知航空';
    }

    async function fetchSheetData(force = false) {
      const CACHE_KEY_TICKETS = 'eddie_tickets_v1', CACHE_KEY_TOURS = 'eddie_tours_v1', CACHE_KEY_HOTELS = 'eddie_hotels_v1', CACHE_TIME = 'eddie_cache_time_v1', now = new Date().getTime();
      if (!force) {
        const cachedTickets = sessionStorage.getItem(CACHE_KEY_TICKETS), cachedTours = sessionStorage.getItem(CACHE_KEY_TOURS), cachedHotels = sessionStorage.getItem(CACHE_KEY_HOTELS), cacheTime = sessionStorage.getItem(CACHE_TIME);
        if (cachedTickets && cachedTours && cachedHotels && cacheTime && (now - parseInt(cacheTime)) < 5 * 60 * 1000) { 
          state.tickets = JSON.parse(cachedTickets); state.tours = JSON.parse(cachedTours); state.hotels = JSON.parse(cachedHotels);
          state.isLoading = false; renderMain(); return; 
        }
      }
      renderMain(); 
      try {
        const res = await fetch(`${API_URL}?cache=${now}`);
        const data = await res.json();
        if (data && data.tickets) {
          let allTickets = data.tickets.flatMap((row, index) => {
            let rawText = row.details || ''; if (rawText) rawText = rawText.replace(/台灣虎航/g, '🐯').replace(/虎航/g, '🐯');
            const inferred = inferInfoFromText(rawText);
            const parsedItems = parseRawDetails(rawText, row.date, row.price);
            return parsedItems.map((item, subIndex) => {
              let finalCity = item.cityContext || row.city || inferred.city, finalCountry = getCountryByCity(finalCity);
              if (!KNOWN_COUNTRIES.includes(finalCountry)) finalCountry = '其他';
              return { id: `ticket-${index}-${subIndex}`, country: finalCountry, city: finalCity.trim(), date: item.date, airline: item.titleContext || row.airline || inferred.title, price: item.price, details: rawText, link: row.link, isFlightAndHotel: item.isFlightAndHotel, isBogo: item.isBogo };
            });
          }).filter(t => t.date);
          
          const ticketMap = new Map(); 
          allTickets.forEach(t => { 
            // 透過航空公司名稱、日期、城市來建立絕對唯一的比對群組
            const airlineKey = extractAirline(t.airline + ' ' + t.details);
            const key = `${t.date}_${t.city}_${airlineKey}_${t.isFlightAndHotel}_${t.isBogo}`;
            
            // 相同日期、航點、航空公司的機票，進行最低價比對
            if (ticketMap.has(key)) {
              const existingPrice = parseInt((ticketMap.get(key).price || '').replace(/\D/g, '')) || 999999;
              const newPrice = parseInt((t.price || '').replace(/\D/g, '')) || 999999;
              if (newPrice < existingPrice) {
                ticketMap.set(key, t); // 發現更便宜的價格，取代舊的
              }
            } else {
              ticketMap.set(key, t); 
            }
          }); 
          state.tickets = Array.from(ticketMap.values());
        }
        if (data && data.tours) {
          let allTours = data.tours.flatMap((row, index) => {
            const parsedItems = parseRawDetails(row.details || '', row.date, row.price);
            return parsedItems.map((item, subIndex) => {
              let finalCountry = row.country; if (item.cityContext) finalCountry = getCountryByCity(item.cityContext) || row.country;
              return { id: `tour-${index}-${subIndex}`, country: finalCountry, title: item.titleContext || row.title, date: item.date, days: row.days, price: item.price, details: row.details, link: row.link, isFlightAndHotel: item.isFlightAndHotel, isBogo: item.isBogo };
            });
          }).filter(t => t.date);
          const tourMap = new Map(); allTours.forEach(t => { const normTitle = normalizeForDedup(t.title).replace(/\d+/g, ''), key = `${t.date}_${normTitle}_${t.isFlightAndHotel}`; tourMap.set(key, t); }); state.tours = Array.from(tourMap.values());
        }
        state.hotels = (data.hotels || []).map((h, i) => ({ id: `hotel-${i}`, country: (h.country||'其他').trim(), city: (h.city||'').trim(), name: h.name||h.飯店名稱||'', description: h.description||h.心得||h.詳細說明||'', link: h.link||h.連結||'' })).filter(h => h.name && h.city);
        sessionStorage.setItem(CACHE_KEY_TICKETS, JSON.stringify(state.tickets)); sessionStorage.setItem(CACHE_KEY_TOURS, JSON.stringify(state.tours)); sessionStorage.setItem(CACHE_KEY_HOTELS, JSON.stringify(state.hotels)); sessionStorage.setItem(CACHE_TIME, now.toString());
      } catch (error) { console.error('API Error:', error); } finally { state.isLoading = false; state.animateTransition = false; renderMain(); }
    }

    window.forceRefresh = () => { state.isLoading = true; fetchSheetData(true); };
    window.executeSearch = (q) => { q = q.trim().toLowerCase(); state.searchQuery = q; if (q) { state.selectedCountryObj = { isSearch: true }; safeUpdateURL(`?q=${encodeURIComponent(q)}`); } else { goHome(); } state.animateTransition = true; renderMain(); state.animateTransition = false; };
    window.goHome = () => { document.getElementById('searchInput').value = ''; state.searchQuery = ''; state.selectedCountryObj = null; state.selectedTab = null; state.currentDate = new Date(); state.animateTransition = true; safeUpdateURL(window.location.pathname || '/'); renderMain(); state.animateTransition = false; window.scrollTo({ top: 0, behavior: 'smooth' }); };
    window.selectCountry = (index) => {
      if (index === 'hotels') { state.selectedCountryObj = { isHotelsGlobal: true }; safeUpdateURL(`?hotels=true`); }
      else { const countryObj = LOCATION_DATA[index]; state.selectedCountryObj = countryObj; state.selectedTab = countryObj.tabs[0].label; state.viewMode = 'calendar'; safeUpdateURL(`?country=${countryObj.slug}&tab=${countryObj.tabs[0].slug}`); }
      state.currentDate = new Date(); state.animateTransition = true; renderMain(); state.animateTransition = false; window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    window.selectTab = (tabLabel) => { state.selectedTab = tabLabel; const countryObj = state.selectedCountryObj; const tabObj = countryObj.tabs.find(t => t.label === tabLabel); safeUpdateURL(`?country=${countryObj.slug}&tab=${tabObj.slug}`); state.currentDate = new Date(); state.animateTransition = false; renderMain(); };

    window.nextMonth = () => { state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + 1, 1); state.animateTransition = false; renderMain(); };

    window.openModal = (dateStr) => {
      const activeTabObj = state.selectedCountryObj.tabs.find(t => t.label === state.selectedTab), allowedCities = activeTabObj ? activeTabObj.cities : [];
      const dayTickets = state.tickets.filter(t => (state.selectedCountryObj.country === '其他' ? t.country === '其他' : t.country === state.selectedCountryObj.country && allowedCities.some(c => t.city.includes(c) || c.includes(t.city))) && t.date === dateStr);
      if (dayTickets.length > 0) { state.selectedDateTickets = { date: dateStr, tickets: dayTickets, isTours: false }; state.isModalOpen = true; renderModal(); }
    };
    window.closeModal = () => { state.isModalOpen = false; renderModal(); };

       if (allMatches.length === 0) return `<div class="text-center py-20 bg-white rounded-3xl border border-gray-100 shadow-sm"><i class="ph-bold ph-magnifying-glass text-5xl text-gray-300 mb-4"></i><h3 class="text-xl font-bold text-gray-800 mb-2">找不到相關資訊</h3></div>`;

        return `<div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm ${index !== 0 ? 'mt-4' : ''}"><div class="flex justify-between items-start mb-4"><div><span class="inline-flex items-center gap-1 bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded-md mb-2">${item.country} · ${item.city}</span><h4 class="text-lg font-black text-gray-900">${item.airline}</h4></div>${item.price ? `<div class="text-right text-xl font-black text-red-500">$${item.price}</div>` : ''}</div><div class="bg-gray-50 p-4 rounded-xl text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${item.details}</div><div class="mt-5 p-3.5 bg-gradient-to-r from-gray-900 to-gray-800 rounded-xl flex items-center justify-between cursor-pointer hover:scale-[1.02] transition-transform border border-gray-700" onclick="window.open('https://esimconnect.com.tw/#/access/esimbuy?referencecode=eddiewang', '_blank')"><div class="flex flex-col"><span class="text-yellow-400 text-[10px] font-bold mb-0.5 tracking-wider">💡 訂好機票了嗎？</span><span class="text-white text-sm font-black">領取艾迪王專屬 eSIM 優惠</span></div><div class="bg-white/20 p-1.5 rounded-lg text-white"><i class="ph-bold ph-caret-right"></i></div></div><a href="${item.link || lineOaUrl}" target="_blank" rel="noreferrer" class="mt-3 w-full text-white font-bold py-3.5 px-4 rounded-xl flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] shadow-sm ${item.link ? 'bg-orange-600' : 'bg-[#06C755]'}"><i class="ph-bold ${item.link ? 'ph-arrow-square-out' : 'ph-chat-circle-dots'} text-xl"></i> ${item.link ? '前往指定報名網頁' : '聯繫合作旅行社 LINE 搶購'}</a></div>`;
      }).join('');
      modalRoot.innerHTML = `<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm fade-in" onclick="if(event.target===this) closeModal()"><div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden zoom-in-95 relative flex flex-col max-h-[85vh]"><div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between shrink-0"><h3 class="text-xl font-bold text-gray-900 flex items-center gap-2"><i class="ph-bold ph-calendar-blank text-gray-400"></i> ${state.selectedDateTickets.date}</h3><button onclick="closeModal()" class="p-2 bg-gray-50 hover:bg-gray-100 text-gray-500 rounded-full flex items-center justify-center"><i class="ph-bold ph-x text-xl"></i></button></div><div class="p-6 overflow-y-auto bg-gray-50/50 flex-1 no-scrollbar">${contentHTML}</div></div></div>`;
    }

    function renderMain() { const el = document.getElementById('main-content'); if (!state.selectedCountryObj && !state.searchQuery) el.innerHTML = getHomeHTML(); else if (state.isLoading) el.innerHTML = getLoadingHTML(); else if (state.searchQuery || state.selectedCountryObj?.isSearch) el.innerHTML = getSearchHTML(); else if (state.selectedCountryObj?.isHotelsGlobal) el.innerHTML = getGlobalHotelsHTML(); else el.innerHTML = getFlightsHTML(); }

    window.addEventListener('DOMContentLoaded', () => {
      const p = new URLSearchParams(location.search), countrySlug = p.get('country'), tabSlug = p.get('tab'), q = p.get('q'), isHotels = p.get('hotels');
      if (q) { state.searchQuery = q; state.selectedCountryObj = { isSearch: true }; document.getElementById('searchInput').value = q; } 
      else if (isHotels) state.selectedCountryObj = { isHotelsGlobal: true };
      else if (countrySlug) { const countryObj = LOCATION_DATA.find(x => x.slug === countrySlug); if (countryObj) { state.selectedCountryObj = countryObj; const tabObj = countryObj.tabs.find(t => t.slug === tabSlug); state.selectedTab = tabObj ? tabObj.label : countryObj.tabs[0].label; } }
      fetchSheetData();
    });
  </script>
</body>
