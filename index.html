  <script>
    // --- 參數設定 ---
    const SHEET_ID = '11K6w4hIwjTdUz1nJo4nt6i0GMC7QujZD8Mky4yy0zZ8';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    
    // 👉 請在這裡填寫旅行社的 LINE 官方帳號 ID (記得包含 @)
    const LINE_OFFICIAL_ID = '@616fwicf'; 

    const LOCATION_DATA = [
      {
        country: '日本',
        image: 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80',
        cities: ['東京', '大阪', '沖繩', '北海道', '石垣島', '名古屋', '仙台', '花卷', '新潟', '秋田', '高松', '福岡', '宮古島', '高知', '熊本']
      },
      {
        country: '韓國',
        image: 'https://images.unsplash.com/photo-1546874177-9e664107314e?auto=format&fit=crop&w=800&q=80',
        cities: ['首爾', '釜山', '濟州島']
      },
      {
        country: '泰國',
        image: 'https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?auto=format&fit=crop&w=800&q=80',
        cities: ['曼谷', '清邁', '普吉島']
      },
      {
        country: '越南',
        image: 'https://images.unsplash.com/photo-1528127269322-539801943592?auto=format&fit=crop&w=800&q=80',
        cities: ['峴港', '胡志明市', '河內', '富國島']
      },
      {
        country: '其他',
        image: 'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?auto=format&fit=crop&w=800&q=80',
        cities: ['其他航點']
      }
    ];

    // --- 機場與別名對照表 (Alias Dictionary) ---
    const CITY_ALIASES = [
      { standard: '首爾', aliases: ['首爾', '仁川', '金浦'] },
      { standard: '釜山', aliases: ['釜山', '金海'] },
      { standard: '濟州島', aliases: ['濟州島', '濟州', 'CJU'] },
      
      { standard: '東京', aliases: ['東京', '成田', '羽田', 'NRT', 'HND'] },
      { standard: '大阪', aliases: ['大阪', '關西', '關空', 'KIX'] },
      { standard: '北海道', aliases: ['北海道', '札幌', '新千歲', '函館', '旭川', '千歲', 'CTS'] },
      { standard: '沖繩', aliases: ['沖繩', '那霸', '琉球', 'OKA'] },
      { standard: '名古屋', aliases: ['名古屋', '中部國際', 'NGO'] },
      { standard: '福岡', aliases: ['福岡', 'FUK'] },
      { standard: '熊本', aliases: ['熊本', 'KMJ', '阿蘇熊本'] },
      
      { standard: '曼谷', aliases: ['曼谷', '蘇凡納布', 'BKK', '廊曼', 'DMK'] },
      { standard: '清邁', aliases: ['清邁', 'CNX'] },
      
      { standard: '胡志明市', aliases: ['胡志明', '新山一', 'SGN'] },
      { standard: '河內', aliases: ['河內', '內排', 'HAN'] },
      { standard: '峴港', aliases: ['峴港', 'DAD'] }
    ];

    // --- 狀態管理 (State) ---
    const state = {
      tickets: [],
      tours: [],
      isLoading: true,
      selectedCountryObj: null,
      selectedCity: null,
      selectedTourCountry: '全部', 
      currentDate: new Date(),
      selectedDateTickets: null,
      isModalOpen: false,
      animateTransition: true
    };

    // --- 輔助函式：從單行文字中抓取城市 ---
    function getCityFromText(text) {
      if (!text) return null;
      for (let mapping of CITY_ALIASES) {
        for (let alias of mapping.aliases) {
          if (text.includes(alias)) return mapping.standard;
        }
      }
      for (let loc of LOCATION_DATA) {
        for (let c of loc.cities) {
          if (text.includes(c)) return c;
        }
      }
      return null;
    }

    // --- 輔助函式：從城市反推國家 ---
    function getCountryByCity(cityName) {
      for (let loc of LOCATION_DATA) {
        if (loc.cities.includes(cityName)) return loc.country;
      }
      return '其他';
    }

    // --- 輔助函式：用來產生去重複用的標準化文字 ---
    const normalizeForDedup = (str) => {
      if (!str) return '';
      try {
        return str.replace(/[\s\p{P}❗️🔥✨⭐⚡️]/gu, '')
                  .replace(/更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊/g, '')
                  .toLowerCase();
      } catch(e) {
        return str.replace(/[\s.,/#!$%^&*;:{}=\-_`~()[\]【】❗️🔥✨⭐⚡️]/g, '')
                  .replace(/更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊/g, '')
                  .toLowerCase();
      }
    };

    // --- 智慧文字解析邏輯 (自動推導預設國家、城市與標題) ---
    function inferInfoFromText(text) {
      let title = '未命名行程';
      let country = '其他';
      let city = '其他航點';
      
      if (!text) return { title, country, city };

      const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');

      let inferredCity = getCityFromText(text);
      if (inferredCity) {
        city = inferredCity;
        country = getCountryByCity(city);
      } else {
        for (let loc of LOCATION_DATA) {
          if (text.includes(loc.country)) {
            country = loc.country;
            break;
          }
        }
      }

      let bestTitle = '';
      let titleScore = -1;

      for (let line of lines) {
        const fluffRegex = /^[\p{Emoji}\s❗️🔥✨⭐⚡️更新降價再降大降價清艙促銷最後機會預估最新快訊]+$/u;
        if (fluffRegex.test(line)) continue;

        let score = 0;
        let lineContainsCityRelated = false;
        
        if (city !== '其他航點' && line.includes(city)) {
          lineContainsCityRelated = true;
        }
        if (!lineContainsCityRelated && city !== '其他航點') {
          const mapping = CITY_ALIASES.find(m => m.standard === city);
          if (mapping) {
            for(let alias of mapping.aliases) {
               if(line.includes(alias)) {
                 lineContainsCityRelated = true;
                 break;
               }
            }
          }
        }

        if (lineContainsCityRelated) {
          score = 2;
        } else if (country !== '其他' && line.includes(country)) {
          score = 1;
        }

        if (score > titleScore) {
          bestTitle = line;
          titleScore = score;
        }
      }

      if (bestTitle) {
        title = bestTitle.replace(/^[\p{Emoji}\s❗️🔥✨⭐⚡️【】\[\]()]+|[\p{Emoji}\s❗️🔥✨⭐⚡️]+$/gu, '');
        title = title.replace(/^(更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '');
        title = title.trim();
      } else if (lines.length > 0) {
        title = lines[0].replace(/^[\p{Emoji}\s❗️🔥✨⭐⚡️【】\[\]()]+|[\p{Emoji}\s❗️🔥✨⭐⚡️]+$/gu, '');
        title = title.replace(/^(更新|降價|再降|大降價|清艙|促銷|最後機會|最新|快訊)\s*/gi, '');
        title = title.trim();
      }

      return { title, country, city };
    }

    // --- 智慧文字解析邏輯 (精準拆分每一行，追蹤上下文城市) ---
    function parseRawDetails(details, fallbackDate, fallbackPrice) {
      const isGlobalPak = details && (details.includes('機+酒') || details.includes('機加酒') || details.includes('機＋酒') || details.includes('自由行'));
      const isGlobalBogo = details && details.includes('買一送一');

      if (!details) return [{ date: fallbackDate, price: fallbackPrice, isFlightAndHotel: false, isBogo: false, cityContext: null }];

      const lines = details.split('\n');
      const items = [];
      const currentYear = new Date().getFullYear();
      const currentMonth = new Date().getMonth() + 1;

      let isPakState = isGlobalPak;
      let currentCityContext = null;

      // 提取日期的共用函數 (支援連寫省略月份，如 5/31、6/02、07、09、14)
      const extractDates = (text) => {
        if (!text) return [];
        const dates = [];
        let currentM = null;
        let currentY = currentYear;

        const dateListRegex = /(?:\d{4}[\/\-])?\d{1,2}[\/\-]\d{1,2}(?!\s*[:月號])(?:[、，,\s\-]+(?:\d{1,2}[\/\-])?\d{1,2}(?!\s*[:月號]))*/g;
        const matchList = text.match(dateListRegex);

        if (matchList) {
          matchList.forEach(listStr => {
            let safeStr = listStr.replace(/(\d{4})-(\d{1,2})-(\d{1,2})/g, '$1/$2/$3');
            safeStr = safeStr.replace(/(^|[^0-9\/])(\d{1,2})-(\d{1,2})(?=[^0-9\/]|$)/g, '$1$2/$3');
            safeStr = safeStr.replace(/\-/g, '、');
            
            const tokens = safeStr.split(/[、，,\s]+/);
            tokens.forEach(token => {
              if (!token) return;
              const parts = token.split('/');
              let y, m, d;
              if (parts.length === 3) {
                y = parseInt(parts[0], 10);
                m = parseInt(parts[1], 10);
                d = parseInt(parts[2], 10);
                currentY = y;
                currentM = m;
              } else if (parts.length === 2) {
                m = parseInt(parts[0], 10);
                d = parseInt(parts[1], 10);
                currentM = m;
                y = (currentM < currentMonth - 2) ? currentYear + 1 : currentYear;
                currentY = y;
              } else if (parts.length === 1) {
                d = parseInt(parts[0], 10);
                if (currentM !== null) {
                  y = currentY;
                  m = currentM;
                } else {
                  return;
                }
              } else {
                return;
              }
              
              if (m >= 1 && m <= 12 && d >= 1 && d <= 31) {
                 dates.push(`${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`);
              }
            });
          });
        }
        return dates;
      };

      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];

        // 追蹤當前的城市上下文 (解決多城市在同一筆資料的問題)
        let foundCityInLine = getCityFromText(line);
        if (foundCityInLine) {
            currentCityContext = foundCityInLine;
        }

        if (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) {
          isPakState = true;
        } else if (line.includes('純機票') || line.includes('單機票')) {
          isPakState = false;
        }

        // 支援多種金額關鍵字
        const priceMatch = line.match(/(?:NT\$|\$|＄|💵|💰|現金價|售價|價格|優惠價|機票)[:：\s\-\$＄]*([0-9,]{3,})/i);

        if (priceMatch) {
          let price = priceMatch[1].replace(/,/g, ''); 
          let dates = extractDates(line);

          // 跨行尋找日期 (解決金額跟日期換行寫的問題)
          if (dates.length === 0 && i > 0) {
            dates = extractDates(lines[i-1]);
          }
          if (dates.length === 0 && i < lines.length - 1) {
            dates = extractDates(lines[i+1]);
          }

          for (let dateStr of dates) {
            let lineIsPak = (line.includes('機+酒') || line.includes('機加酒') || line.includes('機＋酒') || line.includes('自由行')) ? true :
                            (line.includes('純機票') || line.includes('單機票')) ? false : isPakState;
            
            let lineIsBogo = isGlobalBogo || line.includes('買一送一');

            items.push({ 
              date: dateStr, 
              price: price, 
              isFlightAndHotel: lineIsPak, 
              isBogo: lineIsBogo,
              cityContext: currentCityContext
            });
          }
        }
      }

      if (items.length > 0) {
        return items;
      } else {
        return [{ 
          date: fallbackDate, 
          price: fallbackPrice ? String(fallbackPrice).replace(/,/g, '') : '', 
          isFlightAndHotel: isGlobalPak, 
          isBogo: isGlobalBogo,
          cityContext: currentCityContext
        }];
      }
    }

    // --- 資料串接邏輯 (Google Sheets) ---
    async function fetchSheetData() {
      state.isLoading = true;
      renderMain();
      try {
        const cacheBuster = `&cache=${new Date().getTime()}`;
        
        // 1. 讀取機票資料
        const resFlights = await fetch(SHEET_URL + cacheBuster);
        const textFlights = await resFlights.text();
        const jsonStrFlights = textFlights.substring(textFlights.indexOf('{'), textFlights.lastIndexOf('}') + 1);
        const dataFlights = JSON.parse(jsonStrFlights);

        if (dataFlights && dataFlights.table && dataFlights.table.rows) {
          let allTickets = dataFlights.table.rows.slice(1).flatMap((row, index) => {
            let rawText = '';
            if (row.c[1]?.v && String(row.c[1].v).includes('\n')) {
              rawText = row.c[1].v;
            } else if (row.c[5]?.v) {
              rawText = row.c[5].v;
            } else if (row.c[0]?.v && String(row.c[0].v).includes('\n')) {
              rawText = row.c[0].v;
            }

            // 虎航文字自動替換
            if (rawText) {
              rawText = rawText.replace(/台灣虎航/g, '🐯').replace(/虎航/g, '🐯');
            }

            let globalCountry = row.c[0]?.v || '';
            let globalCity = row.c[1]?.v || '';
            let dateVal = row.c[2]?.f || row.c[2]?.v || '';
            let airline = row.c[3]?.v || '';
            let priceVal = row.c[4]?.v || row.c[4]?.f || '';
            let link = row.c[6]?.v || '';

            if (rawText === row.c[1]?.v || rawText === row.c[0]?.v) {
              globalCountry = ''; globalCity = ''; dateVal = ''; airline = ''; priceVal = '';
            }

            const inferred = inferInfoFromText(rawText);
            if (!globalCountry) globalCountry = inferred.country;
            if (!globalCity) globalCity = inferred.city;
            if (!airline) airline = inferred.title;

            const parsedItems = parseRawDetails(rawText, String(dateVal).replace(/\//g, '-'), priceVal);

            return parsedItems.map((item, subIndex) => {
              // 若解析器有找到該行的專屬城市，則優先使用，並重新匹配國家
              let finalCity = item.cityContext || globalCity;
              let finalCountry = globalCountry;
              if (item.cityContext) {
                finalCountry = getCountryByCity(item.cityContext) || globalCountry;
              }

              return {
                id: `ticket-${index}-${subIndex}`,
                country: finalCountry,
                city: finalCity,
                date: item.date,
                airline: airline,
                price: item.price,
                details: rawText, 
                link: link,
                isFlightAndHotel: item.isFlightAndHotel,
                isBogo: item.isBogo
              };
            });
          }).filter(t => t.date);

          const ticketMap = new Map();
          allTickets.forEach(ticket => {
            const normTitle = normalizeForDedup(ticket.airline);
            const key = `${ticket.date}_${ticket.city}_${normTitle}_${ticket.isFlightAndHotel}_${ticket.isBogo}`;
            ticketMap.set(key, ticket);
          });
          state.tickets = Array.from(ticketMap.values());
        }

        // 2. 讀取旅行團資料
        try {
          const sheetName = encodeURIComponent('旅行團');
          const resTours = await fetch(`${SHEET_URL}&sheet=${sheetName}${cacheBuster}`);
          const textTours = await resTours.text();
          const jsonStrTours = textTours.substring(textTours.indexOf('{'), textTours.lastIndexOf('}') + 1);
          const dataTours = JSON.parse(jsonStrTours);
          
          if (dataTours && dataTours.table && dataTours.table.rows) {
            let allTours = dataTours.table.rows.slice(1).flatMap((row, index) => {
              let rawText = '';
              if (row.c[1]?.v && String(row.c[1].v).includes('\n')) {
                rawText = row.c[1].v; 
              } else if (row.c[5]?.v) {
                rawText = row.c[5].v; 
              } else if (row.c[0]?.v && String(row.c[0].v).includes('\n')) {
                rawText = row.c[0].v; 
              }

              // 虎航文字自動替換
              if (rawText) {
                rawText = rawText.replace(/台灣虎航/g, '🐯').replace(/虎航/g, '🐯');
              }

              let globalCountry = row.c[0]?.v || '';
              let title = row.c[1]?.v || '';
              let dateVal = row.c[2]?.f || row.c[2]?.v || '';
              let days = row.c[3]?.v || '';
              let priceVal = row.c[4]?.v || row.c[4]?.f || '';
              let link = row.c[6]?.v || '';

              if (rawText === row.c[1]?.v || rawText === row.c[0]?.v) {
                globalCountry = ''; title = ''; dateVal = ''; days = ''; priceVal = '';
              }

              const inferred = inferInfoFromText(rawText);
              if (!globalCountry) globalCountry = inferred.country;
              if (!title) title = inferred.title;

              if (!days) {
                const daysMatch = rawText.match(/(\d+)[天日]/);
                if (daysMatch) days = daysMatch[0]; 
              }

              const parsedItems = parseRawDetails(rawText, String(dateVal).replace(/\//g, '-'), priceVal);

              return parsedItems.map((item, subIndex) => {
                let finalCountry = globalCountry;
                if (item.cityContext) {
                  finalCountry = getCountryByCity(item.cityContext) || globalCountry;
                }

                return {
                  id: `tour-${index}-${subIndex}`,
                  country: finalCountry,
                  title: title,
                  date: item.date,
                  days: days,
                  price: item.price,
                  details: rawText,
                  link: link,
                  isFlightAndHotel: item.isFlightAndHotel,
                  isBogo: item.isBogo
                };
              });
            }).filter(t => t.date);

            const tourMap = new Map();
            allTours.forEach(tour => {
              const normTitle = normalizeForDedup(tour.title);
              const key = `${tour.date}_${normTitle}_${tour.isFlightAndHotel}_${tour.isBogo}`;
              tourMap.set(key, tour);
            });
            state.tours = Array.from(tourMap.values());
          }
        } catch (e) {
          console.error('旅行團資料讀取失敗:', e);
        }

      } catch (error) {
        console.error('讀取 Google Sheet 錯誤:', error);
      } finally {
        state.isLoading = false;
        state.animateTransition = true;
        renderMain();
        state.animateTransition = false;
      }
    }

      if (state.isLoading) {
        mainEl.innerHTML = getLoadingHTML();
      } else if (!state.selectedCountryObj) {
        mainEl.innerHTML = getHomeHTML();
      } else if (state.selectedCountryObj.isTours) {
        mainEl.innerHTML = getToursHTML();
      } else {
        mainEl.innerHTML = getFlightsHTML();
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      fetchSheetData();
    });

  </script>
</body>
</html>
